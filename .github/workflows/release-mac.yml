name: Release - macOS

on:
  workflow_call:
  workflow_dispatch:

jobs:

  build_mac:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.3'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        modules: 'qtwebengine qtconnectivity qtwebchannel qtpositioning'

    - name: Install SFML and OpenSSL
      run: brew install sfml openssl@3

    - name: Build and install QWT
      run: |
        brew uninstall qwt --force --ignore-dependencies 2>/dev/null || true
        cd /tmp
        curl -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        tar -xjf qwt.tar.bz2
        cd qwt-6.2.0
        sed -i.bak 's/QwtFramework//' qwtconfig.pri
        qmake qwt.pro
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Determine build version
      run: |
        GIT_TAG=$(git describe --tags --match 'v[0-9]*' --always | tr -d '\r' | sed 's/-[0-9]*-g[0-9a-f]*$//')
        [[ "$GIT_TAG" =~ ^[vV][0-9] ]] || GIT_TAG="v0.0.0"
        echo "Build version: $GIT_TAG"
        echo "GIT_TAG=$GIT_TAG" >> "$GITHUB_ENV"

    - name: Build MaximumTrainer
      run: |
        qmake PowerVelo.pro \
          "SFML_INSTALL=$(brew --prefix sfml)" \
          "QWT_INSTALL=/usr/local/qwt-6.2.0"
        make -j$(sysctl -n hw.logicalcpu)

    - name: Package with macdeployqt
      run: |
        # Add rpath for QWT and OpenSSL so macdeployqt can resolve and bundle them.
        install_name_tool -add_rpath /usr/local/lib build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer
        install_name_tool -add_rpath $(brew --prefix openssl@3)/lib build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer
        macdeployqt build/release/MaximumTrainer.app -dmg
        mv build/release/MaximumTrainer.dmg MaximumTrainer-macos.dmg

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: MaximumTrainer-macos.dmg

  # ──────────────────────────────────────────────────────────────────────────
  # Runtime Validation – macOS (release quality gate)
  #
  # Verifies that the application UI initialises to a "Ready" state on macOS:
  #   • Bluetooth stack is queryable (API returns "Not Found", not "Unsupported")
  #   • All four sensor channels carry realistic values within 10 seconds
  #   • A labelled 1280×720 screenshot is captured as visual build evidence
  # ──────────────────────────────────────────────────────────────────────────
  test_runtime_validation:
    runs-on: macos-latest
    needs: build_mac
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Qt (with Bluetooth)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.3'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        modules: 'qtconnectivity'

    - name: Build runtime validation test
      run: |
        mkdir -p build/tests
        cd tests/integration
        qmake runtime_validation_tests.pro
        make -j$(sysctl -n hw.logicalcpu)

    - name: Run runtime validation test
      run: ./build/tests/runtime_validation_tests -v2

    - name: Upload runtime validation screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: runtime-validation-screenshot-macos
        path: build/tests/screenshot-macos-*.png
