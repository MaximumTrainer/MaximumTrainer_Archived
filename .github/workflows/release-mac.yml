name: Release - macOS

on:
  workflow_call:
    inputs:
      build_run_id:
        description: 'Run ID of build.yml that produced the macos artifact'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Run ID of build.yml that produced the macos artifact'
        required: true

jobs:

  build_mac:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download pre-built macos artifact
      uses: actions/download-artifact@v4
      with:
        name: macos
        path: .
        run-id: ${{ inputs.build_run_id }}
        github-token: ${{ github.token }}

    - name: Mark binary executable
      run: chmod +x build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.3'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        modules: 'qtwebengine qtconnectivity qtwebchannel qtpositioning'

    - name: Install SFML and OpenSSL
      run: brew install sfml openssl@3

    - name: Build and install QWT
      run: |
        brew uninstall qwt --force --ignore-dependencies 2>/dev/null || true
        cd /tmp
        curl -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        tar -xjf qwt.tar.bz2
        cd qwt-6.2.0
        sed -i.bak 's/QwtFramework//' qwtconfig.pri
        qmake qwt.pro
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Package with macdeployqt
      run: |
        # Add rpath for QWT and OpenSSL so macdeployqt can resolve and bundle them.
        install_name_tool -add_rpath /usr/local/lib build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer
        install_name_tool -add_rpath $(brew --prefix openssl@3)/lib build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer
        macdeployqt build/release/MaximumTrainer.app -dmg
        mv build/release/MaximumTrainer.dmg MaximumTrainer-macos.dmg

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: MaximumTrainer-macos.dmg
