name: Create BTLE Audit Issues

# Creates the six gap-tracking GitHub issues identified in btle-audit.md and
# adds them to the MaximumTrainer project board.
# Trigger manually once; every step is idempotent (existing issues are skipped).
on:
  workflow_dispatch:

permissions:
  issues: write

jobs:

  create_btle_issues:
    runs-on: ubuntu-22.04

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: Run issue-creation script
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python3 .github/create_btle_issues.py
