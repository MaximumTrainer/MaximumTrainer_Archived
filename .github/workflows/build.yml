name: Build Workflow

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]  # tag pushes are handled by release.yml, not build.yml

jobs:

  build_linux:
    runs-on: ubuntu-22.04

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: Install Qt and system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          qtbase5-dev \
          qtwebengine5-dev \
          qtconnectivity5-dev \
          libqwt-qt5-dev \
          libsfml-dev \
          libvlc-dev \
          libvlccore-dev \
          libusb-1.0-0-dev \
          cmake \
          build-essential

    - name: Build and install VLC-Qt
      run: |
        cd /tmp
        git clone --branch 1.1.1 --depth 1 https://github.com/vlc-qt/vlc-qt
        cd vlc-qt
        mkdir build && cd build
        cmake .. \
          -DQT_VERSION=5 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Create Makefile
      run: |
        export PATH=/usr/lib/qt5/bin:$PATH
        qmake PowerVelo.pro "INCLUDEPATH+=/usr/local/include" "LIBS+=-L/usr/local/lib"
      env:
        QMAKEFEATURES: /usr/share/qt5/mkspecs/features

    - name: Build
      run: |
        export PATH=/usr/lib/qt5/bin:$PATH
        make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: build/

  # ──────────────────────────────────────────────────────────────────────────
  # BTLE Integration Test (Linux)
  #
  # Runs SimulatorHub in a Qt window under Xvfb, takes a screenshot as
  # evidence that Bluetooth sensor detection and an activity session work
  # end-to-end without physical hardware.
  # ──────────────────────────────────────────────────────────────────────────
  test_btle_integration:
    runs-on: ubuntu-22.04
    needs: build_linux

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: Install Qt and dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          qtbase5-dev \
          qtconnectivity5-dev \
          xvfb \
          libfontconfig1 \
          libxrender1 \
          libxext6 \
          libgl1-mesa-dev \
          build-essential

    - name: Build BTLE integration test
      run: |
        export PATH=/usr/lib/qt5/bin:$PATH
        mkdir -p build/tests
        cd tests/integration
        qmake btle_integration_tests.pro
        make -j$(nproc)

    - name: Run BTLE integration test with Xvfb
      run: |
        Xvfb :99 -screen 0 1280x800x24 &
        sleep 1
        export DISPLAY=:99
        ./build/tests/btle_integration_tests -v2

    - name: Upload screenshot evidence
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: btle-integration-screenshot
        path: build/tests/btle_integration_screenshot.png

  build_windows:
    runs-on: windows-latest
    env:
      # Qt installation root - install-qt-action places Qt under $QT_HOME\Qt\$version\$arch.
      # For local Windows builds, set QT_HOME to the parent of your Qt installation
      # (e.g. C:\ if Qt is at C:\Qt\5.15.2\msvc2019_64).
      QT_HOME: C:\Qt

    steps:
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1

    - name: checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        modules: 'qtwebengine'
        dir: ${{ env.QT_HOME }}

    - name: Set QTDIR
      run: echo "QTDIR=${{ env.QT_HOME }}\Qt\5.15.2\msvc2019_64" >> $env:GITHUB_ENV
      shell: powershell

    - name: Write PowerShell helpers
      run: |
        @'
        function Invoke-WebRequestWithRetry {
          param([string]$Uri, [string]$OutFile, [int]$MaxAttempts = 5, [int]$BackoffSeconds = 5)
          for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $Uri -OutFile $OutFile -UseBasicParsing
              return
            } catch {
              if ($attempt -eq $MaxAttempts) { throw }
              Write-Host "Attempt $attempt failed: $_. Retrying in $BackoffSeconds seconds..."
              Start-Sleep -Seconds $BackoffSeconds
              $BackoffSeconds *= 2
            }
          }
        }
        '@ | Set-Content C:\helpers.ps1
      shell: powershell

    - name: Download and install VLC-Qt
      # Using 1.1.0 as it is the last release with pre-built Windows MSVC binaries
      run: |
        . C:\helpers.ps1
        Invoke-WebRequestWithRetry -Uri "https://github.com/vlc-qt/vlc-qt/releases/download/1.1.0/VLC-Qt_1.1.0_win64_msvc2015.7z" -OutFile "$env:TEMP\vlcqt.7z"
        # Archive extracts directly to bin/, include/, lib/ with no wrapper dir
        & "C:\Program Files\7-Zip\7z.exe" x "$env:TEMP\vlcqt.7z" -o"C:\vlcqt"
        $vlcqtInstall = "C:/vlcqt"
        echo "VLCQT_DIR=$vlcqtInstall" >> $env:GITHUB_ENV
        Write-Host "=== VLC-Qt lib files ==="
        Get-ChildItem "C:\vlcqt\include" -Filter "*.lib"
      shell: powershell

    - name: Download and install SFML
      run: |
        curl.exe -L -o "$env:TEMP\sfml.zip" "https://github.com/SFML/SFML/releases/download/2.6.1/SFML-2.6.1-windows-vc17-64-bit.zip"
        Expand-Archive -Path "$env:TEMP\sfml.zip" -DestinationPath "C:\sfml"
      shell: powershell

    - name: Build QWT
      run: |
        # Install QWT to a stable user-profile directory that works both locally
        # and in CI - avoids path issues with workspace-relative paths
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\', '/'
        Set-Location ..
        # Use curl.exe -L to follow SourceForge redirects reliably
        curl.exe -L -o "$env:TEMP\qwt.tar.bz2" "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        7z x "$env:TEMP\qwt.tar.bz2" -o"$env:TEMP" -y
        7z x "$env:TEMP\qwt.tar" -o"." -y
        Rename-Item "qwt-6.2.0" "qwt-src"
        Set-Location "qwt-src"
        # Patch every QWT_INSTALL_PREFIX assignment to use the new path
        (Get-Content "qwtconfig.pri") | ForEach-Object {
            if ($_ -match 'QWT_INSTALL_PREFIX\s*=') {
                $_ -replace '(QWT_INSTALL_PREFIX\s*=\s*).*', "`$1$qwtInstallDirFwd"
            } else { $_ }
        } | Set-Content "qwtconfig.pri"
        qmake qwt.pro
        nmake
        nmake install
      shell: powershell

    - name: Create Makefile
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\','/'
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        $sfmlDirFwd = $sfmlDir -replace '\\','/'
        $env:QMAKEFEATURES = "$qwtInstallDir\features"
        qmake PowerVelo.pro `
          "VLCQT_INSTALL=$($env:VLCQT_DIR -replace '\\','/')" `
          "SFML_INSTALL=$sfmlDirFwd"
        Write-Host "=== VLCQt lines in Makefile.Release ==="
        if (Test-Path Makefile.Release) {
          Select-String -Path Makefile.Release -Pattern "VLCQt|vlcqt" | Select-Object -First 10
        }
      shell: powershell

    - name: Build
      run: nmake

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: build\

  build_mac:
    runs-on: macos-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.3'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        modules: 'qtwebengine qtconnectivity qtwebchannel qtpositioning'

    - name: Install SFML
      run: brew install sfml

    - name: Build and install QWT
      run: |
        # Remove any pre-installed Homebrew qwt that could shadow our headers
        brew uninstall qwt --force --ignore-dependencies 2>/dev/null || true
        cd /tmp
        curl -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        tar -xjf qwt.tar.bz2
        cd qwt-6.2.0
        sed -i.bak 's/QwtFramework//' qwtconfig.pri
        qmake qwt.pro
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Create Makefile
      run: |
        qmake PowerVelo.pro \
          "SFML_INSTALL=$(brew --prefix sfml)" \
          "QWT_INSTALL=/usr/local/qwt-6.2.0"

    - name: Diagnose QWT installation
      run: |
        echo "=== All qwt_plot.h on system ==="
        find /opt/homebrew /usr/local -name "qwt_plot.h" 2>/dev/null || true
        echo "=== Installed qwtconfig.pri ==="
        cat /usr/local/qwt-6.2.0/features/qwtconfig.pri 2>/dev/null || true

    - name: Run MakeFile
      run: make

    - name: Bind rpath for Qt frameworks
      run: |
        install_name_tool -add_rpath /usr/local/lib build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer

    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos
        path: build/

  # ──────────────────────────────────────────────────────────────────────────
  # Auto-tag a new semantic version on master so that release.yml fires.
  # Only runs when all build and test jobs succeed on the master branch.
  # ──────────────────────────────────────────────────────────────────────────
  tag_release:
    needs: [build_linux, test_btle_integration, build_windows, build_mac]
    runs-on: ubuntu-latest
    # Only auto-release from the master branch
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      actions: write
    # Serialize tag creation so concurrent master builds don't race on the same version
    concurrency:
      group: tag_release
      cancel-in-progress: false

    steps:
    - name: Checkout with full tag history
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Compute next semantic version
      id: semver
      run: |
        # Find the latest tag that looks like vMAJOR.MINOR.PATCH; default to v0.0.0
        latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
        if [ -z "$latest" ]; then
          latest="v0.0.0"
        fi
        echo "Latest tag: $latest"
        version="${latest#v}"
        major=$(echo "$version" | cut -d. -f1)
        minor=$(echo "$version" | cut -d. -f2)
        patch=$(echo "$version" | cut -d. -f3)
        patch=$((patch + 1))
        new_tag="v${major}.${minor}.${patch}"
        echo "New tag: $new_tag"
        echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

    - name: Push tag and trigger release
      # Try to create the tag ref via the REST API.  This succeeds for most
      # commits but fails with 403 when the commit modifies .github/workflows/
      # files — GitHub requires the 'workflows' OAuth scope which GITHUB_TOKEN
      # cannot be granted via the permissions: block.
      # In the failure case we skip tag creation here; softprops/action-gh-release
      # in the publish job will create the tag automatically when it creates the
      # GitHub Release. In both cases we dispatch release.yml from 'master'.
      uses: actions/github-script@v7
      with:
        script: |
          const tag = '${{ steps.semver.outputs.new_tag }}';
          try {
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            console.log(`Created tag: ${tag}`);
          } catch (err) {
            if (err.status === 403 || err.status === 422) {
              // 403 = workflow-file commits require 'workflows' scope (ungrantable)
              // 422 = tag already exists (previous run created it)
              console.log(`Note: tag ref creation returned ${err.status} — ` +
                          `softprops/action-gh-release will create/reuse it`);
            } else {
              throw err;
            }
          }
          // Always dispatch from 'master' so the ref is guaranteed to exist.
          // The tag_name input controls the release/tag name in publish job.
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'release.yml',
            ref: 'master',
            inputs: { tag_name: tag }
          });
          console.log(`Dispatched release.yml for ${tag}`);
