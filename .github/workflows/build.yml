name: Build Workflow

on:
  push:
    branches: ["**"]

jobs:

  build_linux:
    runs-on: ubuntu-22.04

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        modules: 'qtwebengine qtconnectivity'

    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          libsfml-dev \
          libvlc-dev \
          libvlccore-dev \
          libusb-1.0-0-dev \
          cmake \
          build-essential

    - name: Build and install QWT
      run: |
        cd /tmp
        curl -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/6.3.0/qwt-6.3.0.tar.bz2/download"
        tar -xjf qwt.tar.bz2
        cd qwt-6.3.0
        qmake qwt.pro
        make -j$(nproc)
        sudo make install

    - name: Build and install VLC-Qt
      run: |
        cd /tmp
        git clone --depth 1 https://github.com/vlc-qt/vlc-qt
        cd vlc-qt
        mkdir build && cd build
        cmake .. \
          -DQT_VERSION=6 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_PREFIX_PATH=$QT_ROOT_DIR
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Create Makefile
      run: qmake PowerVelo.pro "INCLUDEPATH+=/usr/local/include" "LIBS+=-L/usr/local/lib"
      env:
        QMAKEFEATURES: /usr/local/qwt-6.3.0/features

    - name: Build
      run: make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: build/

  build_windows:
    runs-on: windows-latest

    steps:
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1

    - name: checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        arch: 'win64_msvc2019_64'
        modules: 'qtwebengine qtconnectivity'

    - name: Write PowerShell helpers
      run: |
        @'
        function Invoke-WebRequestWithRetry {
          param([string]$Uri, [string]$OutFile, [int]$MaxAttempts = 5, [int]$BackoffSeconds = 5)
          for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $Uri -OutFile $OutFile -UseBasicParsing
              return
            } catch {
              if ($attempt -eq $MaxAttempts) { throw }
              Write-Host "Attempt $attempt failed: $_. Retrying in $BackoffSeconds seconds..."
              Start-Sleep -Seconds $BackoffSeconds
              $BackoffSeconds *= 2
            }
          }
        }
        '@ | Set-Content C:\helpers.ps1
      shell: powershell

    - name: Download VLC Windows SDK
      run: |
        curl.exe -L -o "$env:TEMP\vlc.zip" "https://download.videolan.org/pub/videolan/vlc/3.0.21/win64/vlc-3.0.21-win64.zip"
        Expand-Archive -Path "$env:TEMP\vlc.zip" -DestinationPath "C:\vlc_temp"
        $vlcDir = (Get-ChildItem "C:\vlc_temp" -Directory | Select-Object -First 1).FullName
        Move-Item $vlcDir "C:\vlc"
      shell: powershell

    - name: Build and install VLC-Qt
      run: |
        git clone --depth 1 https://github.com/vlc-qt/vlc-qt C:\vlcqt-src
        mkdir C:\vlcqt-src\build
        cd C:\vlcqt-src\build
        cmake .. -G "NMake Makefiles" `
          -DQT_VERSION=6 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_INSTALL_PREFIX=C:\vlcqt `
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
          -DLIBVLC_INCLUDE_DIR="C:\vlc\sdk\include" `
          -DLIBVLC_LIBRARY="C:\vlc\sdk\lib\libvlc.lib" `
          -DLIBVLCCORE_LIBRARY="C:\vlc\sdk\lib\libvlccore.lib"
        nmake
        nmake install
      shell: powershell

    - name: Download and install SFML
      run: |
        . C:\helpers.ps1
        Invoke-WebRequestWithRetry -Uri "https://www.sfml-dev.org/files/SFML-2.6.1-windows-vc17-64-bit.zip" -OutFile "$env:TEMP\sfml.zip"
        Expand-Archive -Path "$env:TEMP\sfml.zip" -DestinationPath "C:\sfml"
      shell: powershell

    - name: Build QWT
      run: |
        Set-Location ..
        # Use curl.exe -L to follow SourceForge redirects reliably
        curl.exe -L -o "$env:TEMP\qwt.tar.bz2" "https://sourceforge.net/projects/qwt/files/qwt/6.3.0/qwt-6.3.0.tar.bz2/download"
        7z x "$env:TEMP\qwt.tar.bz2" -o"$env:TEMP" -y
        7z x "$env:TEMP\qwt.tar" -o"." -y
        Rename-Item "qwt-6.3.0" "qwt-src"
        Set-Location "qwt-src"
        qmake -after qwt.pro "QWT_INSTALL_PREFIX=..\qwt"
        nmake
        nmake install
      shell: powershell

    - name: Create Makefile
      run: |
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        $sfmlDirFwd = $sfmlDir -replace '\\','/'
        $kitRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\Lib"
        $kitVersion = (Get-ChildItem $kitRoot | Sort-Object Name -Descending | Select-Object -First 1).Name
        $winkitInstall = "$kitRoot\$kitVersion\um\x64" -replace '\\','/'
        qmake PowerVelo.pro `
          "VLCQT_INSTALL=C:/vlcqt" `
          "SFML_INSTALL=$sfmlDirFwd" `
          "INCLUDEPATH+=..\qwt\include" `
          "WINKIT_INSTALL=$winkitInstall"
      shell: powershell
      env:
        QMAKEFEATURES: ..\qwt\features

    - name: Build
      run: nmake

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: build\

  build_mac:
    runs-on: macos-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        modules: 'qtwebengine qtconnectivity'

    - name: Install SFML
      run: brew install sfml

    - name: Install VLC
      run: brew install --cask vlc

    - name: Get VLC development headers
      run: |
        # VLC.app does not ship development headers; extract them from the
        # official VLC Win64 SDK zip (the C API headers are platform-neutral).
        curl -L -o /tmp/vlc-win.zip \
          "https://download.videolan.org/pub/videolan/vlc/3.0.21/win64/vlc-3.0.21-win64.zip"
        unzip /tmp/vlc-win.zip "vlc-3.0.21/sdk/include/*" -d /tmp/vlc-sdk
        echo "VLC_INCLUDE_DIR=/tmp/vlc-sdk/vlc-3.0.21/sdk/include" >> "$GITHUB_ENV"

    - name: Build and install QWT
      run: |
        cd /tmp
        curl -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/6.3.0/qwt-6.3.0.tar.bz2/download"
        tar -xjf qwt.tar.bz2
        cd qwt-6.3.0
        qmake qwt.pro "QWT_CONFIG-=QwtFramework"
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Build and install VLC-Qt
      run: |
        VLC_LIB="/Applications/VLC.app/Contents/MacOS/lib"
        cd /tmp
        git clone --depth 1 https://github.com/vlc-qt/vlc-qt
        cd vlc-qt
        mkdir build && cd build
        cmake .. \
          -DQT_VERSION=6 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
          -DLIBVLC_INCLUDE_DIR="$VLC_INCLUDE_DIR" \
          -DLIBVLC_LIBRARY="$VLC_LIB/libvlc.dylib" \
          -DLIBVLCCORE_LIBRARY="$VLC_LIB/libvlccore.dylib"
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Create Makefile
      run: |
        qmake PowerVelo.pro \
          "SFML_INSTALL=$(brew --prefix sfml)"
      env:
        QMAKEFEATURES: /usr/local/qwt-6.3.0/features

    - name: Run MakeFile
      run: make

    - name: Bind rpath for runtime libraries
      run: |
        install_name_tool -add_rpath /usr/local/lib \
          build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer
        install_name_tool -add_rpath \
          "/Applications/VLC.app/Contents/MacOS/lib" \
          build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer

    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos
        path: build/
