name: Build Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Chocolatey
        @powershell -Command "Set-ExecutionPolicy Bypass -Scope Process -Force; \
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12; \
        iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))"

      - name: Install Qwt
        run: choco install qwt -y

      - name: Build Application
        run: |
          # Set include and library paths
          INCLUDEPATH=C:/ProgramData/chocolatey/lib/qwt/tools/qwt-6.2.0/include; \
          LIBS=C:/ProgramData/chocolatey/lib/qwt/tools/qwt-6.2.0/lib; \
          # Here you would compile your application with the appropriate commands.
          echo "Compiling application..."

      - name: Run tests
        run: |
          echo "Running tests..."
          # Here you would include commands to run your tests.
