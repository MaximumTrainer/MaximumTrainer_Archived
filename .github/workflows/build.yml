name: Build Workflow

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]  # tag pushes are handled by release.yml, not build.yml

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Linux build + BTLE integration test (defined in build-linux.yml)
  # ──────────────────────────────────────────────────────────────────────────
  build_linux:
    uses: ./.github/workflows/build-linux.yml
    permissions:
      contents: read
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────
  # Windows build (defined in build-windows.yml)
  # ──────────────────────────────────────────────────────────────────────────
  build_windows:
    uses: ./.github/workflows/build-windows.yml
    permissions:
      contents: read
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────
  # macOS build (defined in build-mac.yml)
  # ──────────────────────────────────────────────────────────────────────────
  build_mac:
    uses: ./.github/workflows/build-mac.yml
    permissions:
      contents: read
    secrets: inherit

  # ──────────────────────────────────────────────────────────────────────────
  # WASM build (best-effort — runs on every push so WASM issues surface early,
  # but failures do not block tag_release or any other job).
  # Steps are kept in sync with the build_wasm job in release.yml.
  # ──────────────────────────────────────────────────────────────────────────
  build_wasm:
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        # Qt 6.6.3 was built with Emscripten 3.1.37. The emval ABI changed at
        # 3.1.44 (_emval_new etc. moved from compiled WASM to JS-only), which
        # breaks linking against Qt 6.6.3's libqwasm.a. Use 3.1.43 — the last
        # version with the original emval WASM ABI. 3.1.37 was removed from GCS.
        version: '3.1.43'

    - name: Install Qt (Wasm singlethread)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'desktop'
        arch: 'wasm_singlethread'
        modules: 'qtwebchannel'

    - name: Install Qt (linux host tools)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        set-env: false

    - name: Build QWT (Wasm)
      run: |
        cd /tmp
        curl -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/6.3.0/qwt-6.3.0.tar.bz2/download"
        tar -xjf qwt.tar.bz2
        cd qwt-6.3.0
        source "$EMSDK/emsdk_env.sh"
        sed -i "s|QWT_INSTALL_PREFIX[^=]*=.*|QWT_INSTALL_PREFIX = $HOME/qwt-wasm|" qwtconfig.pri
        for feat in QwtDll QwtFramework QwtSvg QwtOpenGL QwtDesigner QwtDesignerSelfContained \
                    QwtExamples QwtPlayground QwtTests QwtConcurrent; do
          echo "QWT_CONFIG -= $feat" >> qwtconfig.pri
        done
        find . \( -name "*.pro" -o -name "*.pri" \) -print0 | \
          xargs -0 sed -i \
            -e '/QT[[:space:]]*+=/s/\bconcurrent\b//g' \
            -e '/QT[[:space:]]*+=/s/\bopengl\b//g' \
            -e '/QT[[:space:]]*+=/s/\bsvg\b//g'
        echo "DEFINES += QWT_NO_CONCURRENT" >> qwtconfig.pri
        echo "DEFINES += QT_NO_QFUTURE"    >> qwtconfig.pri
        find src -name "*.cpp" -print0 | xargs -0 sed -i \
          's|#include <qfuture\.h>|#ifndef QWT_NO_CONCURRENT\n#include <qfuture.h>\n#endif|g'
        find src -name "*.cpp" -print0 | xargs -0 sed -i \
          's|#include <qtconcurrentrun\.h>|#ifndef QWT_NO_CONCURRENT\n#include <qtconcurrentrun.h>\n#endif|g'
        sed -i \
          '/#include <qthread\.h>/a #include <qmap.h>' \
          src/qwt_plot_spectrogram.cpp
        echo "--- patched includes in concurrent-using files ---"
        grep -rn "QWT_NO_CONCURRENT\|qfuture\|qtconcurrentrun" src/*.cpp | grep -v "^Binary"
        qmake qwt.pro
        emmake make -j$(nproc)
        make install

    - name: Determine build version
      run: |
        GIT_TAG=$(git describe --tags --match 'v[0-9]*' --always | tr -d '\r' | sed 's/-[0-9]*-g[0-9a-f]*$//')
        [[ "$GIT_TAG" =~ ^[vV][0-9] ]] || GIT_TAG="v0.0.0"
        echo "Build version: $GIT_TAG"
        echo "GIT_TAG=$GIT_TAG" >> "$GITHUB_ENV"

    - name: Build MaximumTrainer (Wasm)
      run: |
        source "$EMSDK/emsdk_env.sh"
        export QMAKEFEATURES="$HOME/qwt-wasm/features"
        mkdir -p build-wasm && cd build-wasm
        qmake ../PowerVelo.pro \
          "QWT_INSTALL=$HOME/qwt-wasm"
        emmake make -j$(nproc)

    - name: Upload Wasm artifact
      uses: actions/upload-artifact@v4
      with:
        name: wasm
        path: |
          build-wasm/build/release/MaximumTrainer.wasm
          build-wasm/build/release/MaximumTrainer.js
          build-wasm/build/release/qtloader.js
          build-wasm/build/release/qtlogo.svg

  # ──────────────────────────────────────────────────────────────────────────
  # Playwright E2E Tests — WASM app on GitHub Pages
  #
  # Runs the full Playwright suite against the live GitHub Pages deployment at
  # https://maximumtrainer.github.io/MaximumTrainer_Redux/app/.
  #
  # Layer A tests verify UI structure (tabs, widgets) without credentials.
  # Layer B tests inject Intervals.icu credentials and verify the calendar/
  # workout list renders; they skip gracefully when secrets are absent.
  # ──────────────────────────────────────────────────────────────────────────
  test_playwright:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    env:
      INTERVALS_ICU_API_KEY:    ${{ secrets.INTERVALS_ICU_API_KEY }}
      INTERVALS_ICU_ATHLETE_ID: ${{ secrets.INTERVALS_ICU_ATHLETE_ID }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright and browsers
      run: |
        npm install --no-save @playwright/test
        npx playwright install chromium --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/

  # ──────────────────────────────────────────────────────────────────────────
  # Auto-tag a new semantic version on master so that release.yml fires.
  # Only runs when all build and test jobs succeed on the master branch.
  # ──────────────────────────────────────────────────────────────────────────
  tag_release:
    needs: [build_linux, build_windows, build_mac]
    runs-on: ubuntu-latest
    # Only auto-release from the master branch
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      actions: write
    # Serialize tag creation so concurrent master builds don't race on the same version
    concurrency:
      group: tag_release
      cancel-in-progress: false

    steps:
    - name: Checkout with full tag history
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Compute next semantic version
      id: semver
      run: |
        # Find the latest tag that looks like vMAJOR.MINOR.PATCH; default to v0.0.0
        latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
        if [ -z "$latest" ]; then
          latest="v0.0.0"
        fi
        echo "Latest tag: $latest"
        version="${latest#v}"
        major=$(echo "$version" | cut -d. -f1)
        minor=$(echo "$version" | cut -d. -f2)
        patch=$(echo "$version" | cut -d. -f3)
        patch=$((patch + 1))
        new_tag="v${major}.${minor}.${patch}"
        echo "New tag: $new_tag"
        echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

    - name: Push tag and trigger release
      # Try to create the tag ref via the REST API.  This succeeds for most
      # commits but fails with 403 when the commit modifies .github/workflows/
      # files — GitHub requires the 'workflows' OAuth scope which GITHUB_TOKEN
      # cannot be granted via the permissions: block.
      # In the failure case we skip tag creation here; softprops/action-gh-release
      # in the publish job will create the tag automatically when it creates the
      # GitHub Release. In both cases we dispatch release.yml from 'master'.
      uses: actions/github-script@v7
      with:
        script: |
          const tag = '${{ steps.semver.outputs.new_tag }}';
          try {
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            console.log(`Created tag: ${tag}`);
          } catch (err) {
            if (err.status === 403 || err.status === 422) {
              // 403 = workflow-file commits require 'workflows' scope (ungrantable)
              // 422 = tag already exists (previous run created it)
              console.log(`Note: tag ref creation returned ${err.status} — ` +
                          `softprops/action-gh-release will create/reuse it`);
            } else {
              throw err;
            }
          }
          // Always dispatch from 'master' so the ref is guaranteed to exist.
          // The tag_name input controls the release/tag name in publish job.
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'release.yml',
            ref: 'master',
            inputs: { tag_name: tag }
          });
          console.log(`Dispatched release.yml for ${tag}`);
