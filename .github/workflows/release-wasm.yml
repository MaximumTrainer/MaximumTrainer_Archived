name: Release - WASM

on:
  workflow_call:
    inputs:
      build_run_id:
        description: 'Run ID of build.yml that produced the wasm artifact'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Run ID of build.yml that produced the wasm artifact'
        required: true

jobs:

  build_wasm:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout (for docs/app/index.html)
      uses: actions/checkout@v4
      with:
        sparse-checkout: docs/app/index.html
        sparse-checkout-cone-mode: false

    - name: Download pre-built wasm artifact
      uses: actions/download-artifact@v4
      with:
        name: wasm
        run-id: ${{ inputs.build_run_id }}
        github-token: ${{ github.token }}

    - name: Package Wasm artifacts
      run: |
        mkdir -p wasm-out
        cp build-wasm/build/release/MaximumTrainer.wasm wasm-out/
        cp build-wasm/build/release/MaximumTrainer.js   wasm-out/
        cp build-wasm/build/release/qtloader.js         wasm-out/ 2>/dev/null || true
        cp build-wasm/build/release/qtlogo.svg          wasm-out/ 2>/dev/null || true
        cp docs/app/index.html            wasm-out/
        cd wasm-out
        zip -r ../MaximumTrainer-wasm.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wasm-zip
        path: MaximumTrainer-wasm.zip
