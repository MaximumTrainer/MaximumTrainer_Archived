name: Capture Windows Screenshots

# Capture Windows-native UI screenshots and commit them to docs/assets/screenshots/.
# Triggered manually via workflow_dispatch.
#
# Uses the last good Windows release zip (MaximumTrainer-windows-x64.zip) from
# the latest GitHub Release rather than rebuilding from source.  The zip is a
# self-contained windeployqt'd package produced by release-windows.yml.

on:
  workflow_dispatch:

jobs:

  capture_screenshots:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout (for committing screenshots)
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download last good Windows release zip
      run: |
        New-Item -ItemType Directory -Force -Path app | Out-Null
        gh release download --repo ${{ github.repository }} `
          --pattern "MaximumTrainer-windows-x64.zip" `
          --dir app
        Write-Host "Downloaded:"
        Get-ChildItem app
      shell: powershell

    - name: Extract release zip
      run: |
        Expand-Archive -Path "app\MaximumTrainer-windows-x64.zip" -DestinationPath app -Force
        Remove-Item "app\MaximumTrainer-windows-x64.zip"
        if (-not (Test-Path "app\MaximumTrainer.exe")) {
          Write-Error "MaximumTrainer.exe not found after extraction"; exit 1
        }
        Write-Host "Extracted. Exe present: $(Test-Path app\MaximumTrainer.exe)"
      shell: powershell

    - name: Capture screenshots
      run: |
        New-Item -ItemType Directory -Force -Path screenshots | Out-Null
        & app\MaximumTrainer.exe --screenshots screenshots
        $pngs = Get-ChildItem screenshots -Filter "*.png"
        Write-Host "Screenshots captured: $($pngs.Count)"
        $pngs | ForEach-Object { Write-Host "  $($_.Name)" }
        if ($pngs.Count -eq 0) {
          Write-Error "No screenshots were captured"; exit 1
        }
      shell: powershell
      timeout-minutes: 3

    - name: Copy screenshots to docs/assets/screenshots
      run: |
        New-Item -ItemType Directory -Force -Path docs\assets\screenshots | Out-Null
        foreach ($f in (Get-ChildItem screenshots -Filter "*.png")) {
          Copy-Item $f.FullName "docs\assets\screenshots\$($f.Name)" -Force
          Write-Host "Copied: $($f.Name)"
        }
      shell: powershell

    - name: Commit and push screenshots
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/assets/screenshots/*.png
        $status = & git status --porcelain
        if ($status) {
          $msg = "docs: update Windows screenshots [skip ci]`n`nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git commit -m $msg
          git push
          Write-Host "Screenshots committed and pushed."
        } else {
          Write-Host "No screenshot changes to commit."
        }
      shell: powershell
