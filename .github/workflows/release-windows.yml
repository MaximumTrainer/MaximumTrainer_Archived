name: Release - Windows

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — used to derive the MSI version number'
        required: false
        type: string
        default: ''
      build_run_id:
        description: 'Run ID of build.yml that produced the windows artifact'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — used to derive the MSI version number'
        required: false
      build_run_id:
        description: 'Run ID of build.yml that produced the windows artifact'
        required: true

jobs:

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download pre-built windows artifact
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: build
        run-id: ${{ inputs.build_run_id }}
        github-token: ${{ github.token }}

    - name: Create zip from pre-built release folder
      run: Compress-Archive -Path "build\release\*" -DestinationPath "MaximumTrainer-windows-x64.zip" -Force
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-zip
        path: MaximumTrainer-windows-x64.zip

    - name: Set MSI version
      id: msi_version
      run: |
        # tag_name is always provided via workflow_dispatch or workflow_call.
        $tag = "${{ inputs.tag_name }}"
        # Strip leading 'v' so WiX gets a numeric version like 1.2.3
        $version = $tag -replace '^v', ''
        # Normalize to a purely numeric dotted version for WiX (X.Y.Z or X.Y.Z.W)
        # Accept optional prerelease/build suffixes but strip them off.
        if ($version -match '^(?<numeric>\d+\.\d+\.\d+(\.\d+)?)(?:[-+].*)?$') {
          $version = $matches['numeric']
        } else {
          # Fall back to 0.0.1 if no valid numeric version can be derived
          $version = '0.0.1'
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        Write-Host "MSI version: $version"
      shell: powershell

    - name: Generate WiX source file
      run: |
        # WiX Toolset v3 is pre-installed on windows-latest runners.
        # Dynamically generate MaximumTrainer.wxs with the version from the tag.
        # The AppComponents component group is populated by the heat.exe harvest step.
        $version = "${{ steps.msi_version.outputs.version }}"
        $lines = @(
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">',
            "  <Product Id=""*"" Name=""MaximumTrainer"" Language=""1033"" Version=""$version""",
            '           Manufacturer="MaximumTrainer Team"',
            '           UpgradeCode="B076B8C4-CC65-4286-90F3-B34DA237EFAD">',
            '    <Package InstallerVersion="200" Compressed="yes" InstallScope="perMachine" Platform="x64" />',
            '    <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." />',
            '    <MediaTemplate EmbedCab="yes" />',
            '    <Directory Id="TARGETDIR" Name="SourceDir">',
            '      <Directory Id="ProgramFiles64Folder">',
            '        <Directory Id="APPLICATIONROOTDIRECTORY" Name="MaximumTrainer" />',
            '      </Directory>',
            '      <Directory Id="ProgramMenuFolder">',
            '        <Directory Id="AppProgramsFolder" Name="MaximumTrainer" />',
            '      </Directory>',
            '    </Directory>',
            '    <DirectoryRef Id="AppProgramsFolder">',
            '      <Component Id="ApplicationShortcut" Guid="*">',
            '        <Shortcut Id="StartMenuShortcut" Name="MaximumTrainer"',
            '                  Description="Cycling and Rowing Training Application"',
            '                  Target="[APPLICATIONROOTDIRECTORY]MaximumTrainer.exe"',
            '                  WorkingDirectory="APPLICATIONROOTDIRECTORY" />',
            '        <RemoveFolder Id="AppProgramsFolder_Remove" Directory="AppProgramsFolder" On="uninstall" />',
            '        <RegistryValue Root="HKCU" Key="Software\MaximumTrainer" Name="installed"',
            '                       Type="integer" Value="1" KeyPath="yes" />',
            '      </Component>',
            '    </DirectoryRef>',
            '    <Feature Id="ProductFeature" Title="MaximumTrainer" Level="1">',
            '      <ComponentGroupRef Id="AppComponents" />',
            '      <ComponentRef Id="ApplicationShortcut" />',
            '    </Feature>',
            '  </Product>',
            '</Wix>'
        )
        $wxs = $lines -join "`n"
        $utf8NoBom = New-Object System.Text.UTF8Encoding $false
        [System.IO.File]::WriteAllText(
          (Join-Path (Get-Location).Path "MaximumTrainer.wxs"), $wxs, $utf8NoBom)
        Write-Host "Generated MaximumTrainer.wxs for version $version"
      shell: powershell

    - name: Harvest application files with heat.exe
      run: |
        # heat.exe recursively harvests build\release\ (exe + Qt DLLs + plugins
        # subdirectories placed by windeployqt) into a WiX component group fragment.
        # -cg  : component group ID referenced in MaximumTrainer.wxs
        # -dr  : map the harvest root to the APPLICATIONROOTDIRECTORY directory ID
        # -gg  : auto-generate stable component GUIDs based on install path
        # -srd : suppress an explicit root Directory element (root is APPLICATIONROOTDIRECTORY)
        # -var : replace absolute source paths with a preprocessor variable
        heat.exe dir build\release `
          -cg AppComponents `
          -dr APPLICATIONROOTDIRECTORY `
          -gg -srd `
          -platform x64 `
          -var var.SourceDir `
          -out harvested.wxs
        if ($LASTEXITCODE -ne 0) {
          Write-Error "heat.exe failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        Write-Host "Harvested build\release into harvested.wxs"
      shell: powershell

    - name: Compile WiX sources with candle.exe
      run: |
        New-Item -ItemType Directory -Path wixobj -Force | Out-Null
        # -dSourceDir resolves $(var.SourceDir) references in harvested.wxs
        # -arch x64 ensures all harvested components are marked as 64-bit
        candle.exe -arch x64 -dSourceDir=build\release MaximumTrainer.wxs harvested.wxs -o wixobj\
        if ($LASTEXITCODE -ne 0) {
          Write-Error "candle.exe compilation failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
      shell: powershell

    - name: Link MSI with light.exe
      run: |
        light.exe wixobj\MaximumTrainer.wixobj wixobj\harvested.wixobj `
          -o MaximumTrainer-windows-x64.msi
        if ($LASTEXITCODE -ne 0) {
          Write-Error "light.exe linking failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        Write-Host "MSI package created: MaximumTrainer-windows-x64.msi"
      shell: powershell

    - name: Upload MSI artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi
        path: MaximumTrainer-windows-x64.msi

  # ──────────────────────────────────────────────────────────────────────────
  # Install Verification – Windows
  #
  # Installs the MSI produced by build_windows and verifies that:
  #   • The application files (including qwt.dll) are present in the install
  #     directory – catching the "qwt.dll not found" regression at release time.
  #   • The pre-built runtime_validation_tests binary (from the build artifact)
  #     is run as a post-install smoke test.
  # ──────────────────────────────────────────────────────────────────────────
  test_install_windows:
    runs-on: windows-latest
    needs: build_windows
    permissions:
      contents: read
      actions: read

    steps:
    - name: Download pre-built windows artifact (for test binaries)
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: build
        run-id: ${{ inputs.build_run_id }}
        github-token: ${{ github.token }}

    - name: Download MSI artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-msi
        path: installer

    - name: Install MSI
      run: |
        $msi = Get-Item "installer\MaximumTrainer-windows-x64.msi"
        Write-Host "Installing: $($msi.FullName)"
        $result = Start-Process msiexec.exe `
          -ArgumentList "/i", "$($msi.FullName)", "/quiet", "/norestart", "/l*v", "install.log" `
          -Wait -PassThru
        # 0   = success
        # 3010 = success, restart required (safe to ignore in CI)
        # 1641 = success, restart initiated  (safe to ignore in CI)
        $successCodes = @(0, 3010, 1641)
        if ($result.ExitCode -notin $successCodes) {
          Write-Host "=== MSI install log ==="
          Get-Content install.log -ErrorAction SilentlyContinue | Select-Object -Last 60
          Write-Error "MSI installation failed with exit code $($result.ExitCode)"
          exit $result.ExitCode
        }
        if ($result.ExitCode -ne 0) {
          Write-Host "MSI installed successfully (exit code $($result.ExitCode) - restart may be required in non-CI environments)"
        } else {
          Write-Host "Installation completed successfully"
        }
      shell: powershell

    - name: Verify installed files include qwt.dll
      run: |
        $installDir = "$env:ProgramFiles\MaximumTrainer"

        # Guard: confirm the install directory itself was created before listing
        if (-not (Test-Path $installDir)) {
          Write-Error "Install directory not found: $installDir. The MSI may have installed to a different location or failed to create the directory."
          exit 1
        }

        Write-Host "=== Installed files in: $installDir ==="
        Get-ChildItem $installDir | Select-Object Name, Length | Format-Table -AutoSize

        # Check all required files
        $required = @(
          "MaximumTrainer.exe",
          "qwt.dll",
          "Qt5OpenGL.dll",
          "libssl-1_1-x64.dll",
          "libcrypto-1_1-x64.dll"
        )
        $failed = $false
        foreach ($file in $required) {
          if (-not (Test-Path "$installDir\$file")) {
            Write-Error "FAIL: $file not found in install directory"
            $failed = $true
          } else {
            Write-Host "PASS: $file found"
          }
        }
        if ($failed) { exit 1 }
      shell: powershell

    - name: Run runtime validation test (post-install smoke test)
      run: .\build\tests\runtime_validation_tests.exe -v2
      shell: powershell

    - name: Upload install verification screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: install-verification-screenshot-windows
        path: build\tests\screenshot-windows-*.png
