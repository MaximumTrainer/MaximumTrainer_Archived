name: Release - Windows

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — used to derive the MSI version number'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — used to derive the MSI version number'
        required: false

jobs:

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      QT_HOME: C:\Qt

    steps:
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        modules: 'qtwebengine'
        dir: ${{ env.QT_HOME }}

    - name: Set QTDIR
      run: echo "QTDIR=${{ env.QT_HOME }}\Qt\5.15.2\msvc2019_64" >> $env:GITHUB_ENV
      shell: powershell

    - name: Write PowerShell helpers
      run: |
        @'
        function Invoke-WebRequestWithRetry {
          param([string]$Uri, [string]$OutFile, [int]$MaxAttempts = 5, [int]$BackoffSeconds = 5)
          for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $Uri -OutFile $OutFile -UseBasicParsing
              return
            } catch {
              if ($attempt -eq $MaxAttempts) { throw }
              Write-Host "Attempt $attempt failed: $_. Retrying in $BackoffSeconds seconds..."
              Start-Sleep -Seconds $BackoffSeconds
              $BackoffSeconds *= 2
            }
          }
        }
        '@ | Set-Content C:\helpers.ps1
      shell: powershell

    - name: Download and install VLC-Qt
      run: |
        . C:\helpers.ps1
        Invoke-WebRequestWithRetry -Uri "https://github.com/vlc-qt/vlc-qt/releases/download/1.1.0/VLC-Qt_1.1.0_win64_msvc2015.7z" -OutFile "$env:TEMP\vlcqt.7z"
        & "C:\Program Files\7-Zip\7z.exe" x "$env:TEMP\vlcqt.7z" -o"C:\vlcqt"
        echo "VLCQT_DIR=C:/vlcqt" >> $env:GITHUB_ENV
      shell: powershell

    - name: Download and install SFML
      run: |
        curl.exe -L -o "$env:TEMP\sfml.zip" "https://github.com/SFML/SFML/releases/download/2.6.1/SFML-2.6.1-windows-vc17-64-bit.zip"
        Expand-Archive -Path "$env:TEMP\sfml.zip" -DestinationPath "C:\sfml"
      shell: powershell

    - name: Build QWT
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\', '/'
        Set-Location ..
        curl.exe -L -o "$env:TEMP\qwt.tar.bz2" "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        7z x "$env:TEMP\qwt.tar.bz2" -o"$env:TEMP" -y
        7z x "$env:TEMP\qwt.tar" -o"." -y
        Rename-Item "qwt-6.2.0" "qwt-src"
        Set-Location "qwt-src"
        (Get-Content "qwtconfig.pri") | ForEach-Object {
            if ($_ -match 'QWT_INSTALL_PREFIX\s*=') {
                $_ -replace '(QWT_INSTALL_PREFIX\s*=\s*).*', "`$1$qwtInstallDirFwd"
            } else { $_ }
        } | Set-Content "qwtconfig.pri"
        qmake qwt.pro
        nmake
        nmake install
      shell: powershell

    - name: Build MaximumTrainer
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\','/'
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        $sfmlDirFwd = $sfmlDir -replace '\\','/'
        $env:QMAKEFEATURES = "$qwtInstallDir\features"
        qmake PowerVelo.pro `
          "VLCQT_INSTALL=$($env:VLCQT_DIR -replace '\\','/')" `
          "SFML_INSTALL=$sfmlDirFwd"
        nmake
      shell: powershell

    - name: Package with windeployqt
      run: |
        $qtBin = "$env:QTDIR\bin"
        $buildRelease = "build\release"

        # Run windeployqt to bundle Qt DLLs
        & "$qtBin\windeployqt.exe" --release --no-translations "$buildRelease\MaximumTrainer.exe"

        # Copy VLC-Qt runtime DLLs
        Copy-Item "C:\vlcqt\bin\*.dll" "$buildRelease\" -Force -ErrorAction SilentlyContinue

        # Copy SFML runtime DLLs
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        Copy-Item "$sfmlDir\bin\*.dll" "$buildRelease\" -Force -ErrorAction SilentlyContinue

        # Zip the release folder
        Compress-Archive -Path "$buildRelease\*" -DestinationPath "MaximumTrainer-windows-x64.zip" -Force
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-zip
        path: MaximumTrainer-windows-x64.zip

    - name: Prepare application folder for MSI
      run: |
        # Copy the full build output (exe + all DLLs) into the bin/ folder at the
        # workspace root. A subsequent step rewrites wix.json to list each DLL
        # explicitly (WiX candle.exe rejects wildcard Source attributes), so the
        # staging directory must be bin/ so the paths resolve correctly.
        New-Item -ItemType Directory -Path "bin" -Force
        Copy-Item "build\release\MaximumTrainer.exe" "bin\" -Force
        # Copy top-level DLLs (windeployqt + VLC-Qt + SFML runtime)
        $dlls = Get-ChildItem "build\release\*.dll" -ErrorAction SilentlyContinue
        if ($dlls) {
          Copy-Item $dlls.FullName "bin\" -Force
        } else {
          Write-Warning "No DLL files found in build\release\ -- installer will contain the exe only"
        }
      shell: powershell

    - name: Rewrite wix.json with explicit DLL entries
      run: |
        # go-msi passes the items in wix.json's files.items verbatim as WiX
        # File/@Source attributes.  WiX (candle.exe) does not allow wildcards
        # in that attribute, so "bin/*.dll" is illegal.  Enumerate the actual
        # DLL files that were staged into bin/ and rewrite wix.json with
        # explicit paths before go-msi is invoked.
        $wixJson = Get-Content wix.json -Raw | ConvertFrom-Json
        [string[]]$dlls = @(Get-ChildItem "bin\*.dll" -ErrorAction SilentlyContinue |
                            ForEach-Object { "bin/$($_.Name)" })
        $allItems = @("bin/MaximumTrainer.exe") + $dlls
        $wixJson.files.items = $allItems
        $wixJson | ConvertTo-Json -Depth 10 | Set-Content wix.json -Encoding UTF8
        Write-Host "Updated wix.json with $($dlls.Count) DLL(s):"
        $dlls | ForEach-Object { Write-Host "  $_" }
      shell: powershell

    - name: Install go-msi
      run: choco install -y go-msi
      shell: powershell

    - name: Set MSI version
      id: msi_version
      run: |
        # Use the tag_name input when provided (workflow_call / standalone workflow_dispatch),
        # otherwise fall back to github.ref_name (direct tag-push trigger).
        $tag = if ("${{ inputs.tag_name }}" -ne "") { "${{ inputs.tag_name }}" } else { "${{ github.ref_name }}" }
        # Strip leading 'v' so WiX gets a numeric version like 1.2.3
        $version = $tag -replace '^v', ''
        # Normalize to a purely numeric dotted version for WiX (X.Y.Z or X.Y.Z.W)
        # Accept optional prerelease/build suffixes but strip them off.
        if ($version -match '^(?<numeric>\d+\.\d+\.\d+(\.\d+)?)(?:[-+].*)?$') {
          $version = $matches['numeric']
        } else {
          # Fall back to 0.0.1 if no valid numeric version can be derived
          $version = '0.0.1'
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        Write-Host "MSI version: $version"
      shell: powershell

    - name: Build Windows Installer MSI from exe file
      run: |
        # go-msi was installed as an MSI package in the previous step, which updates
        # the machine-level registry PATH but not the current PowerShell session PATH.
        # Refresh $env:Path from the registry so go-msi is found.
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        $version = "${{ steps.msi_version.outputs.version }}"
        Write-Host "Building MSI version $version"

        # go-msi internally calls filepath.Rel(tempDir, sourceFile).  The GitHub
        # Actions workspace lives on D:\ while the default system TEMP is on C:\.
        # filepath.Rel() cannot cross drive letters on Windows, so we redirect
        # TEMP/TMP to a directory on D:\ (same drive as the workspace) before
        # invoking go-msi so that its temp directory is created on the same drive.
        $goMsiTmp = "D:\go-msi-tmp"
        New-Item -ItemType Directory -Path $goMsiTmp -Force | Out-Null
        $env:TEMP = $goMsiTmp
        $env:TMP  = $goMsiTmp

        go-msi make --msi MaximumTrainer-windows-x64.msi --version $version
      shell: powershell

    - name: Upload MSI artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi
        path: MaximumTrainer-windows-x64.msi
