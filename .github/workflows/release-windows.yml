name: Release - Windows

on:
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — used to derive the MSI version number'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) — used to derive the MSI version number'
        required: false

jobs:

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      QT_HOME: C:\Qt

    steps:
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        modules: 'qtwebengine'
        dir: ${{ env.QT_HOME }}

    - name: Set QTDIR
      run: echo "QTDIR=${{ env.QT_HOME }}\Qt\5.15.2\msvc2019_64" >> $env:GITHUB_ENV
      shell: powershell

    - name: Write PowerShell helpers
      run: |
        @'
        function Invoke-WebRequestWithRetry {
          param([string]$Uri, [string]$OutFile, [int]$MaxAttempts = 5, [int]$BackoffSeconds = 5)
          for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $Uri -OutFile $OutFile -UseBasicParsing
              return
            } catch {
              if ($attempt -eq $MaxAttempts) { throw }
              Write-Host "Attempt $attempt failed: $_. Retrying in $BackoffSeconds seconds..."
              Start-Sleep -Seconds $BackoffSeconds
              $BackoffSeconds *= 2
            }
          }
        }
        '@ | Set-Content C:\helpers.ps1
      shell: powershell

    - name: Download and install VLC-Qt
      run: |
        . C:\helpers.ps1
        Invoke-WebRequestWithRetry -Uri "https://github.com/vlc-qt/vlc-qt/releases/download/1.1.0/VLC-Qt_1.1.0_win64_msvc2015.7z" -OutFile "$env:TEMP\vlcqt.7z"
        & "C:\Program Files\7-Zip\7z.exe" x "$env:TEMP\vlcqt.7z" -o"C:\vlcqt"
        echo "VLCQT_DIR=C:/vlcqt" >> $env:GITHUB_ENV
      shell: powershell

    - name: Download and install SFML
      run: |
        curl.exe -L -o "$env:TEMP\sfml.zip" "https://github.com/SFML/SFML/releases/download/2.6.1/SFML-2.6.1-windows-vc17-64-bit.zip"
        Expand-Archive -Path "$env:TEMP\sfml.zip" -DestinationPath "C:\sfml"
      shell: powershell

    - name: Build QWT
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\', '/'
        Set-Location ..
        curl.exe -L -o "$env:TEMP\qwt.tar.bz2" "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        7z x "$env:TEMP\qwt.tar.bz2" -o"$env:TEMP" -y
        7z x "$env:TEMP\qwt.tar" -o"." -y
        Rename-Item "qwt-6.2.0" "qwt-src"
        Set-Location "qwt-src"
        (Get-Content "qwtconfig.pri") | ForEach-Object {
            if ($_ -match 'QWT_INSTALL_PREFIX\s*=') {
                $_ -replace '(QWT_INSTALL_PREFIX\s*=\s*).*', "`$1$qwtInstallDirFwd"
            } else { $_ }
        } | Set-Content "qwtconfig.pri"
        qmake qwt.pro
        nmake
        nmake install
      shell: powershell

    - name: Build MaximumTrainer
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\','/'
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        $sfmlDirFwd = $sfmlDir -replace '\\','/'
        $env:QMAKEFEATURES = "$qwtInstallDir\features"
        qmake PowerVelo.pro `
          "VLCQT_INSTALL=$($env:VLCQT_DIR -replace '\\','/')" `
          "SFML_INSTALL=$sfmlDirFwd"
        nmake
      shell: powershell

    - name: Package with windeployqt
      run: |
        $qtBin = "$env:QTDIR\bin"
        $buildRelease = "build\release"

        # Run windeployqt to bundle Qt DLLs
        & "$qtBin\windeployqt.exe" --release --no-translations "$buildRelease\MaximumTrainer.exe"

        # Copy VLC-Qt runtime DLLs
        Copy-Item "C:\vlcqt\bin\*.dll" "$buildRelease\" -Force -ErrorAction SilentlyContinue

        # Copy SFML runtime DLLs
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        Copy-Item "$sfmlDir\bin\*.dll" "$buildRelease\" -Force -ErrorAction SilentlyContinue

        # Zip the release folder
        Compress-Archive -Path "$buildRelease\*" -DestinationPath "MaximumTrainer-windows-x64.zip" -Force
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-zip
        path: MaximumTrainer-windows-x64.zip

    - name: Set MSI version
      id: msi_version
      run: |
        # Use the tag_name input when provided (workflow_call / standalone workflow_dispatch),
        # otherwise fall back to github.ref_name (direct tag-push trigger).
        $tag = if ("${{ inputs.tag_name }}" -ne "") { "${{ inputs.tag_name }}" } else { "${{ github.ref_name }}" }
        # Strip leading 'v' so WiX gets a numeric version like 1.2.3
        $version = $tag -replace '^v', ''
        # Normalize to a purely numeric dotted version for WiX (X.Y.Z or X.Y.Z.W)
        # Accept optional prerelease/build suffixes but strip them off.
        if ($version -match '^(?<numeric>\d+\.\d+\.\d+(\.\d+)?)(?:[-+].*)?$') {
          $version = $matches['numeric']
        } else {
          # Fall back to 0.0.1 if no valid numeric version can be derived
          $version = '0.0.1'
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        Write-Host "MSI version: $version"
      shell: powershell

    - name: Generate WiX source file
      run: |
        # WiX Toolset v3 is pre-installed on windows-latest runners.
        # Dynamically generate MaximumTrainer.wxs with the version from the tag.
        # The AppComponents component group is populated by the heat.exe harvest step.
        $version = "${{ steps.msi_version.outputs.version }}"
        $wxs = @"
<?xml version="1.0" encoding="UTF-8"?>
<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
  <Product Id="*" Name="MaximumTrainer" Language="1033" Version="$version"
           Manufacturer="MaximumTrainer Team"
           UpgradeCode="B076B8C4-CC65-4286-90F3-B34DA237EFAD">
    <Package InstallerVersion="200" Compressed="yes" InstallScope="perMachine" />
    <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." />
    <MediaTemplate EmbedCab="yes" />
    <Directory Id="TARGETDIR" Name="SourceDir">
      <Directory Id="ProgramFilesFolder">
        <Directory Id="APPLICATIONROOTDIRECTORY" Name="MaximumTrainer" />
      </Directory>
      <Directory Id="ProgramMenuFolder">
        <Directory Id="AppProgramsFolder" Name="MaximumTrainer" />
      </Directory>
    </Directory>
    <DirectoryRef Id="AppProgramsFolder">
      <Component Id="ApplicationShortcut" Guid="*">
        <Shortcut Id="StartMenuShortcut" Name="MaximumTrainer"
                  Description="Cycling and Rowing Training Application"
                  Target="[APPLICATIONROOTDIRECTORY]MaximumTrainer.exe"
                  WorkingDirectory="APPLICATIONROOTDIRECTORY" />
        <RemoveFolder Id="AppProgramsFolder_Remove" Directory="AppProgramsFolder" On="uninstall" />
        <RegistryValue Root="HKCU" Key="Software\MaximumTrainer" Name="installed"
                       Type="integer" Value="1" KeyPath="yes" />
      </Component>
    </DirectoryRef>
    <Feature Id="ProductFeature" Title="MaximumTrainer" Level="1">
      <ComponentGroupRef Id="AppComponents" />
      <ComponentRef Id="ApplicationShortcut" />
    </Feature>
  </Product>
</Wix>
"@
        $utf8NoBom = New-Object System.Text.UTF8Encoding $false
        [System.IO.File]::WriteAllText(
          (Join-Path (Get-Location).Path "MaximumTrainer.wxs"), $wxs, $utf8NoBom)
        Write-Host "Generated MaximumTrainer.wxs for version $version"
      shell: powershell

    - name: Harvest application files with heat.exe
      run: |
        # heat.exe recursively harvests build\release\ (exe + Qt DLLs + plugins
        # subdirectories placed by windeployqt) into a WiX component group fragment.
        # -cg  : component group ID referenced in MaximumTrainer.wxs
        # -dr  : map the harvest root to the APPLICATIONROOTDIRECTORY directory ID
        # -gg  : auto-generate stable component GUIDs based on install path
        # -srd : suppress an explicit root Directory element (root is APPLICATIONROOTDIRECTORY)
        # -var : replace absolute source paths with a preprocessor variable
        heat.exe dir build\release `
          -cg AppComponents `
          -dr APPLICATIONROOTDIRECTORY `
          -gg -srd `
          -var var.SourceDir `
          -out harvested.wxs
        if ($LASTEXITCODE -ne 0) {
          Write-Error "heat.exe failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        Write-Host "Harvested build\release into harvested.wxs"
      shell: powershell

    - name: Compile WiX sources with candle.exe
      run: |
        New-Item -ItemType Directory -Path wixobj -Force | Out-Null
        # -dSourceDir resolves $(var.SourceDir) references in harvested.wxs
        candle.exe -dSourceDir=build\release MaximumTrainer.wxs harvested.wxs -o wixobj\
        if ($LASTEXITCODE -ne 0) {
          Write-Error "candle.exe compilation failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
      shell: powershell

    - name: Link MSI with light.exe
      run: |
        light.exe wixobj\MaximumTrainer.wixobj wixobj\harvested.wixobj `
          -o MaximumTrainer-windows-x64.msi
        if ($LASTEXITCODE -ne 0) {
          Write-Error "light.exe linking failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        Write-Host "MSI package created: MaximumTrainer-windows-x64.msi"
      shell: powershell

    - name: Upload MSI artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-msi
        path: MaximumTrainer-windows-x64.msi

  # ──────────────────────────────────────────────────────────────────────────
  # Runtime Validation – Windows (release quality gate)
  #
  # Verifies that the application UI initialises to a "Ready" state on Windows:
  #   • Bluetooth stack is queryable (API returns "Not Found", not "Unsupported")
  #   • All four sensor channels carry realistic values within 10 seconds
  #   • A labelled 1280×720 screenshot is captured as visual build evidence
  # ──────────────────────────────────────────────────────────────────────────
  test_runtime_validation:
    runs-on: windows-latest
    needs: build_windows
    permissions:
      contents: read
    env:
      QT_HOME: C:\Qt

    steps:
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt (with Bluetooth)
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        modules: 'qtconnectivity'
        dir: ${{ env.QT_HOME }}

    - name: Set QTDIR
      run: echo "QTDIR=${{ env.QT_HOME }}\Qt\5.15.2\msvc2019_64" >> $env:GITHUB_ENV
      shell: powershell

    - name: Build runtime validation test
      run: |
        New-Item -ItemType Directory -Force -Path build\tests | Out-Null
        Set-Location tests\integration
        qmake runtime_validation_tests.pro
        nmake
      shell: powershell

    - name: Run runtime validation test
      run: .\build\tests\runtime_validation_tests.exe -v2
      shell: powershell

    - name: Upload runtime validation screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: runtime-validation-screenshot-windows
        path: build\tests\screenshot-windows-*.png
