name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0) - used only when triggered manually'
        required: true

jobs:

  # ────────────────────────────────────── LINUX ──────────────────────────────────────
  build_linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt and system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          qtbase5-dev \
          qtwebengine5-dev \
          qtconnectivity5-dev \
          libqwt-qt5-dev \
          libsfml-dev \
          libvlc-dev \
          libvlccore-dev \
          libusb-1.0-0-dev \
          cmake \
          build-essential \
          libfuse2 \
          file

    - name: Build and install VLC-Qt
      run: |
        cd /tmp
        git clone --branch 1.1.1 --depth 1 https://github.com/vlc-qt/vlc-qt
        cd vlc-qt
        mkdir build && cd build
        cmake .. \
          -DQT_VERSION=5 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Build
      run: |
        export PATH=/usr/lib/qt5/bin:$PATH
        qmake PowerVelo.pro "INCLUDEPATH+=/usr/local/include" "LIBS+=-L/usr/local/lib"
        make -j$(nproc)
      env:
        QMAKEFEATURES: /usr/share/qt5/mkspecs/features

    - name: Download linuxdeployqt
      run: |
        curl -Lo /usr/local/bin/linuxdeployqt \
          "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod +x /usr/local/bin/linuxdeployqt

    - name: Package AppImage
      run: |
        export PATH=/usr/lib/qt5/bin:$PATH
        # Create AppDir structure
        mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
        cp build/release/MaximumTrainer AppDir/usr/bin/
        # Desktop entry required by linuxdeployqt
        cat > AppDir/usr/share/applications/maximumtrainer.desktop << 'EOF'
        [Desktop Entry]
        Name=Maximum Trainer
        Exec=MaximumTrainer
        Icon=maximumtrainer
        Type=Application
        Categories=Sports;
        EOF
        # Copy icon
        if [ -f resources/images/main_icon.png ]; then
          cp resources/images/main_icon.png AppDir/usr/share/icons/hicolor/256x256/apps/maximumtrainer.png
        else
          # Fallback: create a placeholder icon
          touch AppDir/usr/share/icons/hicolor/256x256/apps/maximumtrainer.png
        fi
        linuxdeployqt AppDir/usr/share/applications/maximumtrainer.desktop \
          -qmake=/usr/lib/qt5/bin/qmake \
          -appimage \
          -no-strip \
          -extra-plugins=iconengines,imageformats
        # linuxdeployqt names the AppImage after the desktop Name= entry + git hash + arch
        # (e.g. Maximum_Trainer-<hash>-x86_64.AppImage), so use a wildcard to rename it
        appimage=$(find . -maxdepth 1 -name "*.AppImage" | head -1)
        if [ -z "$appimage" ]; then echo "Error: No AppImage found"; exit 1; fi
        mv "$appimage" MaximumTrainer-linux-x86_64.AppImage

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: MaximumTrainer-linux-x86_64.AppImage

  # ────────────────────────────────────── WINDOWS ────────────────────────────────────
  build_windows:
    runs-on: windows-latest
    env:
      QT_HOME: C:\Qt

    steps:
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        modules: 'qtwebengine'
        dir: ${{ env.QT_HOME }}

    - name: Set QTDIR
      run: echo "QTDIR=${{ env.QT_HOME }}\Qt\5.15.2\msvc2019_64" >> $env:GITHUB_ENV
      shell: powershell

    - name: Write PowerShell helpers
      run: |
        @'
        function Invoke-WebRequestWithRetry {
          param([string]$Uri, [string]$OutFile, [int]$MaxAttempts = 5, [int]$BackoffSeconds = 5)
          for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $Uri -OutFile $OutFile -UseBasicParsing
              return
            } catch {
              if ($attempt -eq $MaxAttempts) { throw }
              Write-Host "Attempt $attempt failed: $_. Retrying in $BackoffSeconds seconds..."
              Start-Sleep -Seconds $BackoffSeconds
              $BackoffSeconds *= 2
            }
          }
        }
        '@ | Set-Content C:\helpers.ps1
      shell: powershell

    - name: Download and install VLC-Qt
      run: |
        . C:\helpers.ps1
        Invoke-WebRequestWithRetry -Uri "https://github.com/vlc-qt/vlc-qt/releases/download/1.1.0/VLC-Qt_1.1.0_win64_msvc2015.7z" -OutFile "$env:TEMP\vlcqt.7z"
        & "C:\Program Files\7-Zip\7z.exe" x "$env:TEMP\vlcqt.7z" -o"C:\vlcqt"
        echo "VLCQT_DIR=C:/vlcqt" >> $env:GITHUB_ENV
      shell: powershell

    - name: Download and install SFML
      run: |
        curl.exe -L -o "$env:TEMP\sfml.zip" "https://github.com/SFML/SFML/releases/download/2.6.1/SFML-2.6.1-windows-vc17-64-bit.zip"
        Expand-Archive -Path "$env:TEMP\sfml.zip" -DestinationPath "C:\sfml"
      shell: powershell

    - name: Build QWT
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\', '/'
        Set-Location ..
        curl.exe -L -o "$env:TEMP\qwt.tar.bz2" "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        7z x "$env:TEMP\qwt.tar.bz2" -o"$env:TEMP" -y
        7z x "$env:TEMP\qwt.tar" -o"." -y
        Rename-Item "qwt-6.2.0" "qwt-src"
        Set-Location "qwt-src"
        (Get-Content "qwtconfig.pri") | ForEach-Object {
            if ($_ -match 'QWT_INSTALL_PREFIX\s*=') {
                $_ -replace '(QWT_INSTALL_PREFIX\s*=\s*).*', "`$1$qwtInstallDirFwd"
            } else { $_ }
        } | Set-Content "qwtconfig.pri"
        qmake qwt.pro
        nmake
        nmake install
      shell: powershell

    - name: Build MaximumTrainer
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\','/'
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        $sfmlDirFwd = $sfmlDir -replace '\\','/'
        $env:QMAKEFEATURES = "$qwtInstallDir\features"
        qmake PowerVelo.pro `
          "VLCQT_INSTALL=$($env:VLCQT_DIR -replace '\\','/')" `
          "SFML_INSTALL=$sfmlDirFwd"
        nmake
      shell: powershell

    - name: Package with windeployqt
      run: |
        $qtBin = "$env:QTDIR\bin"
        $buildRelease = "build\release"

        # Run windeployqt to bundle Qt DLLs
        & "$qtBin\windeployqt.exe" --release --no-translations "$buildRelease\MaximumTrainer.exe"

        # Copy VLC-Qt runtime DLLs
        Copy-Item "C:\vlcqt\bin\*.dll" "$buildRelease\" -Force -ErrorAction SilentlyContinue

        # Copy SFML runtime DLLs
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        Copy-Item "$sfmlDir\bin\*.dll" "$buildRelease\" -Force -ErrorAction SilentlyContinue

        # Zip the release folder
        Compress-Archive -Path "$buildRelease\*" -DestinationPath "MaximumTrainer-windows-x64.zip" -Force
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-zip
        path: MaximumTrainer-windows-x64.zip

  # ────────────────────────────────────── MACOS ──────────────────────────────────────
  build_mac:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.7.3'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        modules: 'qtwebengine qtconnectivity qtwebchannel qtpositioning'

    - name: Install SFML
      run: brew install sfml

    - name: Build and install QWT
      run: |
        brew uninstall qwt --force --ignore-dependencies 2>/dev/null || true
        cd /tmp
        curl -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        tar -xjf qwt.tar.bz2
        cd qwt-6.2.0
        sed -i.bak 's/QwtFramework//' qwtconfig.pri
        qmake qwt.pro
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Build MaximumTrainer
      run: |
        qmake PowerVelo.pro \
          "SFML_INSTALL=$(brew --prefix sfml)" \
          "QWT_INSTALL=/usr/local/qwt-6.2.0"
        make -j$(sysctl -n hw.logicalcpu)

    - name: Package with macdeployqt
      run: |
        install_name_tool -add_rpath /usr/local/lib build/release/MaximumTrainer.app/Contents/MacOS/MaximumTrainer
        macdeployqt build/release/MaximumTrainer.app -dmg
        mv build/release/MaximumTrainer.dmg MaximumTrainer-macos.dmg

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: MaximumTrainer-macos.dmg

  # ────────────────────────────────────── WASM ──────────────────────────────────────
  build_wasm:
    runs-on: ubuntu-22.04
    # WASM is a best-effort build; a failure here must not block the main-platform release
    continue-on-error: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        # Qt 6.6.x requires Emscripten 3.1.37
        version: '3.1.37'

    - name: Install Qt (Wasm singlethread)
      uses: jurplel/install-qt-action@v3
      with:
        # 6.6.3 is the latest stable 6.6 release; 6.7.3 wasm_singlethread is
        # no longer available on Qt mirrors as of early 2026
        version: '6.6.3'
        host: 'linux'
        target: 'desktop'
        arch: 'wasm_singlethread'
        # qtconnectivity is not available for wasm_singlethread; WASM Bluetooth
        # is bridged via JavaScript WebBluetooth (PowerVelo.pro already does
        # QT -= bluetooth in the wasm_emscripten scope).
        modules: 'qtwebchannel'

    - name: Install Qt (linux host tools)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        # set-env: false keeps gcc_64 from overwriting the WASM Qt env vars.
        # No 'dir:' here — both WASM and host installs must share the same
        # base directory so the wasm_singlethread qmake wrapper can resolve
        # the sibling path Qt/6.6.3/gcc_64/bin/qmake6.
        set-env: false

    - name: Build QWT (Wasm)
      run: |
        cd /tmp
        curl -L -o qwt.tar.bz2 "https://sourceforge.net/projects/qwt/files/qwt/6.3.0/qwt-6.3.0.tar.bz2/download"
        tar -xjf qwt.tar.bz2
        cd qwt-6.3.0
        source "$EMSDK/emsdk_env.sh"
        # Patch install prefix and disable WASM-incompatible QWT features via sed.
        # Inline qmake "-=" assignments (e.g. "QWT_CONFIG -= QwtFramework") are
        # split by the WASM qmake wrapper script before reaching the host qmake6,
        # causing "Unknown option -=".  Editing qwtconfig.pri directly avoids this.
        sed -i "s|QWT_INSTALL_PREFIX[^=]*=.*|QWT_INSTALL_PREFIX = $HOME/qwt-wasm|" qwtconfig.pri
        for feat in QwtFramework QwtSvg QwtOpenGL QwtDesigner QwtExamples QwtConcurrent; do
          sed -i "/${feat}/d" qwtconfig.pri
        done
        qmake qwt.pro
        emmake make -j$(nproc)
        make install

    - name: Build MaximumTrainer (Wasm)
      run: |
        source "$EMSDK/emsdk_env.sh"
        # Point qmake to the WASM QWT feature file so CONFIG += qwt resolves correctly
        export QMAKEFEATURES="$HOME/qwt-wasm/features"
        mkdir -p build-wasm && cd build-wasm
        qmake ../PowerVelo.pro \
          "QWT_INSTALL=$HOME/qwt-wasm"
        emmake make -j$(nproc)

    - name: Package Wasm artifacts
      run: |
        mkdir -p wasm-out
        cp build-wasm/MaximumTrainer.wasm wasm-out/
        cp build-wasm/MaximumTrainer.js   wasm-out/
        cp build-wasm/qtloader.js         wasm-out/ 2>/dev/null || true
        cp build-wasm/qtlogo.svg          wasm-out/ 2>/dev/null || true
        cp docs/app/index.html            wasm-out/
        cd wasm-out
        zip -r ../MaximumTrainer-wasm.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: wasm-zip
        path: MaximumTrainer-wasm.zip

  # ────────────────────────────────────── PUBLISH ────────────────────────────────────
  publish:
    needs: [build_linux, build_windows, build_mac, build_wasm]
    runs-on: ubuntu-latest
    # Run whenever the three main platform builds succeed, even if the WASM build failed
    if: |
      always() &&
      needs.build_linux.result == 'success' &&
      needs.build_windows.result == 'success' &&
      needs.build_mac.result == 'success'
    permissions:
      contents: write

    steps:
    - name: Download Linux AppImage
      uses: actions/download-artifact@v4
      with:
        name: linux-appimage

    - name: Download Windows zip
      uses: actions/download-artifact@v4
      with:
        name: windows-zip

    - name: Download macOS dmg
      uses: actions/download-artifact@v4
      with:
        name: macos-dmg

    - name: Download Wasm zip
      id: download_wasm
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: wasm-zip

    - name: Checkout repo (for docs/app deploy)
      uses: actions/checkout@v4
      with:
        path: repo
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy Wasm files to docs/app/
      if: steps.download_wasm.outcome == 'success'
      run: |
        mkdir -p repo/docs/app
        unzip -o MaximumTrainer-wasm.zip -d repo/docs/app/
        cd repo
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/app/
        git diff --cached --quiet || git commit -m "chore: deploy Wasm build artifacts for ${{ github.ref_name }} [skip ci]"
        git push

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
        generate_release_notes: true
        fail_on_unmatched_files: false
        files: |
          MaximumTrainer-linux-x86_64.AppImage
          MaximumTrainer-windows-x64.zip
          MaximumTrainer-macos.dmg
          MaximumTrainer-wasm.zip

  # ────────────────────────────────────── VERIFY ─────────────────────────────────────
  verify_assets:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Verify release assets are downloadable
      run: |
        REPO="${{ github.repository }}"
        mkdir -p /tmp/release-assets
        cd /tmp/release-assets

        echo "Verifying release assets for tag: $TAG"

        # Required assets – the job fails if any of these are missing or empty
        REQUIRED=(
          "MaximumTrainer-linux-x86_64.AppImage"
          "MaximumTrainer-windows-x64.zip"
          "MaximumTrainer-macos.dmg"
        )

        for asset in "${REQUIRED[@]}"; do
          echo "Downloading $asset ..."
          gh release download "$TAG" --repo "$REPO" --pattern "$asset"
          if [ ! -s "$asset" ]; then
            echo "ERROR: $asset is missing or empty in release $TAG"
            exit 1
          fi
          SIZE=$(stat -c%s "$asset")
          echo "✓ $asset  (${SIZE} bytes)"
        done

        # WASM asset is best-effort: warn but do not fail if absent
        echo "Checking optional WASM asset ..."
        if gh release download "$TAG" --repo "$REPO" --pattern "MaximumTrainer-wasm.zip" 2>/dev/null; then
          if [ -s "MaximumTrainer-wasm.zip" ]; then
            SIZE=$(stat -c%s "MaximumTrainer-wasm.zip")
            echo "✓ MaximumTrainer-wasm.zip  (${SIZE} bytes)"
          else
            echo "WARNING: MaximumTrainer-wasm.zip is present but empty"
          fi
        else
          echo "NOTE: MaximumTrainer-wasm.zip not found in release (Wasm build is best-effort)"
        fi

        echo ""
        echo "All required release assets are present and downloadable."
