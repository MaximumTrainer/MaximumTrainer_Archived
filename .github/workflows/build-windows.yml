name: Build - Windows

on:
  workflow_call:
  workflow_dispatch:

jobs:

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      # Qt installation root - install-qt-action places Qt under $QT_HOME\Qt\$version\$arch.
      # For local Windows builds, set QT_HOME to the parent of your Qt installation
      # (e.g. C:\ if Qt is at C:\Qt\5.15.2\msvc2019_64).
      QT_HOME: C:\Qt

    steps:
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1

    - name: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        modules: 'qtwebengine'
        dir: ${{ env.QT_HOME }}

    - name: Set QTDIR
      run: echo "QTDIR=${{ env.QT_HOME }}\Qt\5.15.2\msvc2019_64" >> $env:GITHUB_ENV
      shell: powershell

    - name: Write PowerShell helpers
      run: |
        @'
        function Invoke-WebRequestWithRetry {
          param([string]$Uri, [string]$OutFile, [int]$MaxAttempts = 5, [int]$BackoffSeconds = 5)
          for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri $Uri -OutFile $OutFile -UseBasicParsing
              return
            } catch {
              if ($attempt -eq $MaxAttempts) { throw }
              Write-Host "Attempt $attempt failed: $_. Retrying in $BackoffSeconds seconds..."
              Start-Sleep -Seconds $BackoffSeconds
              $BackoffSeconds *= 2
            }
          }
        }
        '@ | Set-Content C:\helpers.ps1
      shell: powershell

    - name: Download OpenSSL 1.1.x
      # Qt 5.15.2 requires OpenSSL 1.1.x DLLs (libssl-1_1-x64.dll / libcrypto-1_1-x64.dll)
      # for HTTPS/TLS. Download the pre-built FireDaemon distribution and expose the
      # DLL directory as OPENSSL_BIN so later steps can reference it.
      run: |
        . C:\helpers.ps1
        Invoke-WebRequestWithRetry `
          -Uri "https://download.firedaemon.com/FireDaemon-OpenSSL/openssl-1.1.1w.zip" `
          -OutFile "$env:TEMP\openssl.zip"
        Expand-Archive -Path "$env:TEMP\openssl.zip" -DestinationPath "$env:TEMP\openssl" -Force
        $dll = Get-ChildItem "$env:TEMP\openssl" -Recurse -Filter "libssl-1_1-x64.dll" |
               Select-Object -First 1
        if (-not $dll) { Write-Error "libssl-1_1-x64.dll not found in archive"; exit 1 }
        echo "OPENSSL_BIN=$($dll.DirectoryName)" >> $env:GITHUB_ENV
        Write-Host "OpenSSL DLLs at: $($dll.DirectoryName)"
      shell: powershell

    - name: Download and install VLC-Qt
      # Using 1.1.0 as it is the last release with pre-built Windows MSVC binaries
      run: |
        . C:\helpers.ps1
        Invoke-WebRequestWithRetry -Uri "https://github.com/vlc-qt/vlc-qt/releases/download/1.1.0/VLC-Qt_1.1.0_win64_msvc2015.7z" -OutFile "$env:TEMP\vlcqt.7z"
        # Archive extracts directly to bin/, include/, lib/ with no wrapper dir
        & "C:\Program Files\7-Zip\7z.exe" x "$env:TEMP\vlcqt.7z" -o"C:\vlcqt"
        $vlcqtInstall = "C:/vlcqt"
        echo "VLCQT_DIR=$vlcqtInstall" >> $env:GITHUB_ENV
        Write-Host "=== VLC-Qt lib files ==="
        Get-ChildItem "C:\vlcqt\lib" -Filter "*.lib"
      shell: powershell

    - name: Download and install SFML
      run: |
        curl.exe -L -o "$env:TEMP\sfml.zip" "https://github.com/SFML/SFML/releases/download/2.6.1/SFML-2.6.1-windows-vc17-64-bit.zip"
        Expand-Archive -Path "$env:TEMP\sfml.zip" -DestinationPath "C:\sfml"
      shell: powershell

    - name: Build QWT
      run: |
        # Install QWT to a stable user-profile directory that works both locally
        # and in CI - avoids path issues with workspace-relative paths
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\', '/'
        Set-Location ..
        # Use curl.exe -L to follow SourceForge redirects reliably
        curl.exe -L -o "$env:TEMP\qwt.tar.bz2" "https://sourceforge.net/projects/qwt/files/qwt/6.2.0/qwt-6.2.0.tar.bz2/download"
        7z x "$env:TEMP\qwt.tar.bz2" -o"$env:TEMP" -y
        7z x "$env:TEMP\qwt.tar" -o"." -y
        Rename-Item "qwt-6.2.0" "qwt-src"
        Set-Location "qwt-src"
        # Patch every QWT_INSTALL_PREFIX assignment to use the new path
        (Get-Content "qwtconfig.pri") | ForEach-Object {
            if ($_ -match 'QWT_INSTALL_PREFIX\s*=') {
                $_ -replace '(QWT_INSTALL_PREFIX\s*=\s*).*', "`$1$qwtInstallDirFwd"
            } else { $_ }
        } | Set-Content "qwtconfig.pri"
        qmake qwt.pro
        nmake
        nmake install
      shell: powershell

    - name: Determine build version
      run: |
        $tag = (git describe --tags --match 'v[0-9]*' --always) -replace '\r','' -replace '-\d+-g[0-9a-f]+$',''
        if (-not ($tag -match '^[vV][0-9]')) { $tag = 'v0.0.0' }
        "GIT_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "Build version: $tag"
      shell: powershell

    - name: Create Makefile
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtInstallDirFwd = $qwtInstallDir -replace '\\','/'
        $sfmlDir = (Get-ChildItem "C:\sfml" -Directory | Select-Object -First 1).FullName
        $sfmlDirFwd = $sfmlDir -replace '\\','/'
        $env:QMAKEFEATURES = "$qwtInstallDir\features"
        qmake PowerVelo.pro `
          "VLCQT_INSTALL=$($env:VLCQT_DIR -replace '\\','/')" `
          "SFML_INSTALL=$sfmlDirFwd"
        Write-Host "=== VLCQt lines in Makefile.Release ==="
        if (Test-Path Makefile.Release) {
          Select-String -Path Makefile.Release -Pattern "VLCQt|vlcqt" | Select-Object -First 10
        }
      shell: powershell

    - name: Build
      run: nmake

    - name: Copy QWT runtime DLL
      # qwt.dll is linked at build time but windeployqt does not know about it.
      # Copy it alongside MaximumTrainer.exe so the build artifact is self-contained
      # and MaximumTrainer.exe can be launched directly from build\release\ without
      # a "qwt.dll not found" loader error.
      run: |
        $qwtInstallDir = "$env:USERPROFILE\qwt"
        $qwtDll = "$qwtInstallDir\lib\qwt.dll"
        if (-not (Test-Path $qwtDll)) {
          Write-Error "qwt.dll not found at expected path: $qwtDll"
          exit 1
        }
        Copy-Item $qwtDll "build\release\" -Force
        Write-Host "Copied qwt.dll to build\release\"
      shell: powershell

    - name: Copy OpenSSL DLLs
      # Qt 5.15.2 requires OpenSSL 1.1.x DLLs for HTTPS/TLS.
      # OPENSSL_BIN is set by the "Download OpenSSL 1.1.x" step above.
      run: |
        $opensslBin = "$env:OPENSSL_BIN"
        if (Test-Path $opensslBin) {
          foreach ($dll in @("libssl-1_1-x64.dll", "libcrypto-1_1-x64.dll")) {
            $src = "$opensslBin\$dll"
            if (Test-Path $src) {
              Copy-Item $src "build\release\" -Force
              Write-Host "Copied $dll"
            } else {
              Write-Warning "OpenSSL DLL not found: $src"
            }
          }
        } else {
          Write-Warning "OPENSSL_BIN directory not found: $opensslBin"
        }
      shell: powershell

    - name: Build runtime validation test
      run: |
        New-Item -ItemType Directory -Force -Path build\tests | Out-Null
        Set-Location tests\integration
        qmake runtime_validation_tests.pro
        nmake
      shell: powershell

    - name: Build offline mode test
      run: |
        New-Item -ItemType Directory -Force -Path build\tests | Out-Null
        Set-Location tests\integration
        qmake offline_mode_tests.pro
        nmake
      shell: powershell

    - name: Build online mode test
      run: |
        New-Item -ItemType Directory -Force -Path build\tests | Out-Null
        Set-Location tests\integration
        qmake online_mode_tests.pro
        nmake
      shell: powershell

    - name: Deploy Qt for test binaries
      run: |
        & "$env:QTDIR\bin\windeployqt.exe" --release `
            --no-translations `
            --no-system-d3d-compiler `
            build\tests\runtime_validation_tests.exe
        & "$env:QTDIR\bin\windeployqt.exe" --release `
            --no-translations `
            --no-system-d3d-compiler `
            build\tests\offline_mode_tests.exe
        & "$env:QTDIR\bin\windeployqt.exe" --release `
            --no-translations `
            --no-system-d3d-compiler `
            build\tests\online_mode_tests.exe
        foreach ($dll in @("libssl-1_1-x64.dll", "libcrypto-1_1-x64.dll")) {
          $src = "$env:OPENSSL_BIN\$dll"
          if (Test-Path $src) { Copy-Item $src "build\tests\" -Force }
        }
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: build\

  # ──────────────────────────────────────────────────────────────────────────
  # Runtime Validation – Windows
  #
  # Verifies that the application UI initialises to a "Ready" state on Windows:
  #   • Bluetooth stack is queryable (API returns "Not Found", not "Unsupported")
  #   • All four sensor channels carry realistic values within 10 seconds
  #   • A labelled 1280×720 screenshot is captured as visual build evidence
  # ──────────────────────────────────────────────────────────────────────────
  test_runtime_validation:
    runs-on: windows-latest
    needs: build_windows
    permissions:
      contents: read

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: build

    - name: Run runtime validation test
      run: .\build\tests\runtime_validation_tests.exe -v2
      shell: powershell

    - name: Upload runtime validation screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: runtime-validation-screenshot-windows
        path: build\tests\screenshot-windows-*.png

  # ──────────────────────────────────────────────────────────────────────────
  # Offline Mode Integration Test – Windows
  #
  # Verifies that MaximumTrainer's core offline functionality works on Windows
  # without a network connection and without physical Bluetooth hardware:
  #   • Local workout XML files can be created and parsed from disk.
  #   • SimulatorHub broadcasts realistic CSC (0x1816) and Power (0x1818)
  #     cycling data (cadence, speed, power) within expected ranges.
  #   • A labelled 1280×720 screenshot is captured showing the offline mode
  #     indicator and live BTLE sensor metrics.
  #   • Accumulated data points are written to a TSV activity file,
  #     confirming offline data persistence.
  # ──────────────────────────────────────────────────────────────────────────
  test_offline_mode:
    runs-on: windows-latest
    needs: build_windows
    permissions:
      contents: read

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: build

    - name: Run offline mode test
      run: .\build\tests\offline_mode_tests.exe -v2
      shell: powershell

    - name: Upload offline mode screenshot and activity file
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: offline-mode-artefacts-windows
        path: |
          build\tests\offline-mode-windows-*.png
          build\tests\activity-windows-*.tsv

  # ──────────────────────────────────────────────────────────────────────────
  # Intervals.icu Live Integration Tests – Windows
  #
  # Makes real HTTP requests to https://intervals.icu/api/v1 using the shared
  # test account.  Requires GitHub Secrets to be configured:
  #   INTERVALS_ICU_API_KEY    – personal API key (intervals.icu Settings → API)
  #   INTERVALS_ICU_ATHLETE_ID – athlete ID, e.g. i12345
  #
  # Tests call QSKIP gracefully when either secret is absent (fork PRs, local
  # development without credentials).
  # ──────────────────────────────────────────────────────────────────────────
  test_intervals_icu_integration:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      INTERVALS_ICU_API_KEY:    ${{ secrets.INTERVALS_ICU_API_KEY }}
      INTERVALS_ICU_ATHLETE_ID: ${{ secrets.INTERVALS_ICU_ATHLETE_ID }}

    steps:
    - name: MSVC Environment Setup
      uses: ilammy/msvc-dev-cmd@v1

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        dir: 'C:\Qt'

    - name: Set QTDIR
      run: echo "QTDIR=C:\Qt\Qt\5.15.2\msvc2019_64" >> $env:GITHUB_ENV
      shell: powershell

    - name: Download OpenSSL 1.1.x
      run: |
        Invoke-WebRequest -Uri "https://download.firedaemon.com/FireDaemon-OpenSSL/openssl-1.1.1w.zip" `
          -OutFile "$env:TEMP\openssl.zip" -UseBasicParsing
        Expand-Archive -Path "$env:TEMP\openssl.zip" -DestinationPath "$env:TEMP\openssl" -Force
        $dll = Get-ChildItem "$env:TEMP\openssl" -Recurse -Filter "libssl-1_1-x64.dll" | Select-Object -First 1
        echo "OPENSSL_BIN=$($dll.DirectoryName)" >> $env:GITHUB_ENV
      shell: powershell

    - name: Build integration tests
      run: |
        New-Item -ItemType Directory -Force -Path build\tests | Out-Null
        Set-Location tests\intervals_icu_integration
        qmake intervals_icu_integration_tests.pro
        nmake
      shell: powershell

    - name: Deploy Qt DLLs for test binary
      run: |
        & "$env:QTDIR\bin\windeployqt.exe" --release `
            --no-translations `
            --no-system-d3d-compiler `
            build\tests\intervals_icu_integration_tests.exe
        foreach ($dll in @("libssl-1_1-x64.dll", "libcrypto-1_1-x64.dll")) {
          $src = "$env:OPENSSL_BIN\$dll"
          if (Test-Path $src) { Copy-Item $src "build\tests\" -Force }
        }
      shell: powershell

    - name: Run Intervals.icu integration tests
      run: .\build\tests\intervals_icu_integration_tests.exe -v2
      shell: powershell

  # ──────────────────────────────────────────────────────────────────────────
  # Online Mode Authentication Test – Windows
  #
  # Simulates a user authenticating into the running application on Windows.
  # A 1280x720 window is shown, a live HTTPS authentication request is made
  # to https://intervals.icu/api/v1 using credentials from GitHub Secrets,
  # and the result is displayed in the window and captured as a screenshot.
  #
  # Requires GitHub Secrets to be configured:
  #   INTERVALS_ICU_API_KEY    – personal API key (intervals.icu Settings → API)
  #   INTERVALS_ICU_ATHLETE_ID – athlete ID, e.g. i12345
  #
  # The test calls QSKIP gracefully when either secret is absent (fork PRs,
  # local development without credentials).
  # ──────────────────────────────────────────────────────────────────────────
  test_online_mode:
    runs-on: windows-latest
    needs: build_windows
    permissions:
      contents: read
    env:
      INTERVALS_ICU_API_KEY:    ${{ secrets.INTERVALS_ICU_API_KEY }}
      INTERVALS_ICU_ATHLETE_ID: ${{ secrets.INTERVALS_ICU_ATHLETE_ID }}

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: build

    - name: Run online mode authentication test
      run: .\build\tests\online_mode_tests.exe -v2
      shell: powershell

    - name: Upload online mode screenshot
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: online-mode-screenshot-windows
        path: build\tests\online-mode-windows-*.png
