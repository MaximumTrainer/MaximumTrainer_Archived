<!DOCTYPE html>
<!-- MaximumTrainer WASM Web App -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maximum Trainer — Web App (Beta)</title>
  <meta name="description" content="Maximum Trainer running in your browser via WebAssembly and WebBluetooth." />
  <link rel="icon" type="image/png" href="../assets/images/main_icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ── Loading screen ───────────────────────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      background: #0d0d0d;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-screen img { width: 80px; height: 80px; opacity: 0.9; }
    #loading-title { font-size: 1.5rem; font-weight: 600; }
    #loading-progress-wrap {
      width: min(320px, 80vw);
      height: 6px; border-radius: 3px;
      background: #333;
      overflow: hidden;
    }
    #loading-progress {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #e05a00, #ff8c00);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    #loading-status {
      font-size: 0.875rem;
      color: #888;
      min-height: 1.2em;
    }

    /* ── Browser requirement banner ──────────────────────────────────── */
    #browser-warning {
      display: none;
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
      background: #0d0d0d;
      z-index: 200;
      padding: 2rem;
      text-align: center;
    }
    #browser-warning .card {
      max-width: 440px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2.5rem 2rem;
    }
    #browser-warning h2 { font-size: 1.4rem; margin-bottom: 0.75rem; }
    #browser-warning p  { color: #aaa; line-height: 1.6; margin-bottom: 1rem; }
    #browser-warning a  {
      display: inline-block; margin-top: 0.5rem;
      padding: 0.6rem 1.4rem;
      background: #e05a00; color: #fff;
      border-radius: 6px; text-decoration: none;
      font-weight: 600;
    }

    /* ── Qt canvas ───────────────────────────────────────────────────── */
    #qt-canvas-wrapper {
      position: fixed; inset: 0;
      visibility: hidden;
    }
    #qt-canvas {
      width: 100%; height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <!-- WASM Loading Logger — inject before any other scripts so hooks are in place -->
  <script src="logger.js"></script>

  <!-- Browser capability check -->
  <div id="browser-warning">
    <div class="card">
      <h2>Unsupported Browser</h2>
      <p>
        The browser version of Maximum Trainer requires <strong>WebBluetooth</strong>,
        which is only supported in <strong>Chrome</strong> or <strong>Edge</strong>
        (desktop, version 70+).
      </p>
      <p>
        Please open this page in Chrome or Edge, or download the native app for
        the best experience.
      </p>
      <a href="..">← Back to site</a>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <img src="../assets/images/main_icon.png" alt="Maximum Trainer" />
    <div id="loading-title">Maximum Trainer</div>
    <div id="loading-progress-wrap">
      <div id="loading-progress"></div>
    </div>
    <div id="loading-status">Loading application…</div>
  </div>

  <!-- Qt Wasm canvas -->
  <div id="qt-canvas-wrapper">
    <canvas id="qt-canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>

  <script>
    // ── Check for WebBluetooth support ──────────────────────────────────
    if (!navigator.bluetooth) {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('browser-warning').style.display = 'flex';
    } else {
      // ── Qt 6.6 WebAssembly loader ────────────────────────────────────
      // Deployment layout (written by release.yml publish job):
      //   docs/app/qtloader.js        — Qt 6.6 loader (defines window.QtLoader)
      //   docs/app/MaximumTrainer.js  — Emscripten glue (defines window.createQtAppInstance)
      //   docs/app/MaximumTrainer.wasm
      const loadingProgress = document.getElementById('loading-progress');
      const loadingStatus   = document.getElementById('loading-status');

      function showNotDeployed() {
        loadingStatus.textContent = '';
        document.getElementById('loading-screen').innerHTML = `
          <img src="../assets/images/main_icon.png" alt="Maximum Trainer" style="width:80px;opacity:0.9"/>
          <div style="font-size:1.4rem;font-weight:600">Browser App — Coming Soon</div>
          <div style="max-width:360px;text-align:center;color:#aaa;line-height:1.6;font-size:0.95rem">
            The WebAssembly build hasn't been deployed yet.<br>
            It will be available here after the first tagged release.<br><br>
            <a href=".." style="color:#ff8c00;text-decoration:none;font-weight:600">← Download the native app</a>
          </div>`;
      }

      // Step 1: load qtloader.js (Qt 6.6 — defines window.QtLoader)
      const log = (msg) => window._wasmLogger && window._wasmLogger.log(msg);
      log('Loading qtloader.js…');
      const loaderScript = document.createElement('script');
      loaderScript.src = 'qtloader.js';
      loaderScript.onerror = () => { log('ERROR: Failed to load qtloader.js'); showNotDeployed(); };
      loaderScript.onload = () => {
        log('qtloader.js ready');

        // Step 2: load MaximumTrainer.js (Qt 6.6 — defines window.createQtAppInstance)
        log('Loading MaximumTrainer.js…');
        const appScript = document.createElement('script');
        appScript.src = 'MaximumTrainer.js';
        appScript.onerror = () => { log('ERROR: Failed to load MaximumTrainer.js'); showNotDeployed(); };
        appScript.onload = () => {
          log('MaximumTrainer.js ready — starting QtLoader…');

          // Step 3: initialise with the Qt 6.6 QtLoader API
          QtLoader({
            qt: {
              entryFunction: window.createQtAppInstance,
              containerElements: [document.getElementById('qt-canvas')],
              onLoaded: () => {
                log('Qt application loaded');
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('qt-canvas-wrapper').style.visibility = 'visible';
              },
              onExit: (exitData) => {
                const code = exitData && exitData.code !== undefined ? ' (code ' + exitData.code + ')' : '';
                log('Application exited' + code);
                loadingStatus.textContent = 'Application exited' + code;
              },
            },
            // Emscripten module config — used for download progress
            moduleConfig: {
              setStatus: (msg) => {
                if (msg) { log(msg); loadingStatus.textContent = msg; }
              },
              monitorRunDependencies: (left) => {
                // Rough progress: dependencies count down from ~100 to 0
                if (left === 0) {
                  loadingProgress.style.width = '100%';
                } else {
                  loadingProgress.style.width = Math.max(5, 100 - left) + '%';
                }
              },
            },
          }).then(instance => {
            window._qtInstance = instance;
          }).catch(err => {
            log('ERROR: Failed to start: ' + err);
            loadingStatus.textContent = 'Failed to start: ' + err;
          });
        };
        document.head.appendChild(appScript);
      };
      document.head.appendChild(loaderScript);
    }
  </script>
</body>
</html>
