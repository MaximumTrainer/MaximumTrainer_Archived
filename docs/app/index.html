<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maximum Trainer — Web App (Beta)</title>
  <meta name="description" content="Maximum Trainer running in your browser via WebAssembly and WebBluetooth." />
  <link rel="icon" type="image/png" href="../assets/images/main_icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ── Loading screen ───────────────────────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      background: #0d0d0d;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-screen img { width: 80px; height: 80px; opacity: 0.9; }
    #loading-title { font-size: 1.5rem; font-weight: 600; }
    #loading-progress-wrap {
      width: min(320px, 80vw);
      height: 6px; border-radius: 3px;
      background: #333;
      overflow: hidden;
    }
    #loading-progress {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #e05a00, #ff8c00);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    #loading-status {
      font-size: 0.875rem;
      color: #888;
      min-height: 1.2em;
    }

    /* ── Browser requirement banner ──────────────────────────────────── */
    #browser-warning {
      display: none;
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
      background: #0d0d0d;
      z-index: 200;
      padding: 2rem;
      text-align: center;
    }
    #browser-warning .card {
      max-width: 440px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2.5rem 2rem;
    }
    #browser-warning h2 { font-size: 1.4rem; margin-bottom: 0.75rem; }
    #browser-warning p  { color: #aaa; line-height: 1.6; margin-bottom: 1rem; }
    #browser-warning a  {
      display: inline-block; margin-top: 0.5rem;
      padding: 0.6rem 1.4rem;
      background: #e05a00; color: #fff;
      border-radius: 6px; text-decoration: none;
      font-weight: 600;
    }

    /* ── Qt canvas ───────────────────────────────────────────────────── */
    #qt-canvas-wrapper {
      position: fixed; inset: 0;
      visibility: hidden;
    }
    #qt-canvas {
      width: 100%; height: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Browser capability check -->
  <div id="browser-warning">
    <div class="card">
      <h2>Unsupported Browser</h2>
      <p>
        The browser version of Maximum Trainer requires <strong>WebBluetooth</strong>,
        which is only supported in <strong>Chrome</strong> or <strong>Edge</strong>
        (desktop, version 70+).
      </p>
      <p>
        Please open this page in Chrome or Edge, or download the native app for
        the best experience.
      </p>
      <a href="..">← Back to site</a>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen">
    <img src="../assets/images/main_icon.png" alt="Maximum Trainer" />
    <div id="loading-title">Maximum Trainer</div>
    <div id="loading-progress-wrap">
      <div id="loading-progress"></div>
    </div>
    <div id="loading-status">Loading application…</div>
  </div>

  <!-- Qt Wasm canvas -->
  <div id="qt-canvas-wrapper">
    <canvas id="qt-canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>

  <script>
    // ── Check for WebBluetooth support ──────────────────────────────────
    if (!navigator.bluetooth) {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('browser-warning').style.display = 'flex';
    } else {
      // ── Qt WebAssembly loader ────────────────────────────────────────
      // qtloader.js and MaximumTrainer.js are deployed here by the CI
      // build_wasm job (see .github/workflows/release.yml).
      const loadingProgress = document.getElementById('loading-progress');
      const loadingStatus   = document.getElementById('loading-status');

      // qtloader.js is generated by Qt alongside the .wasm binary.
      // Load it dynamically so the page still renders if not yet deployed.
      const script = document.createElement('script');
      script.src = 'qtloader.js';
      script.onerror = () => {
        loadingStatus.textContent = '';
        document.getElementById('loading-screen').innerHTML = `
          <img src="../assets/images/main_icon.png" alt="Maximum Trainer" style="width:80px;opacity:0.9"/>
          <div style="font-size:1.4rem;font-weight:600">Browser App — Coming Soon</div>
          <div style="max-width:360px;text-align:center;color:#aaa;line-height:1.6;font-size:0.95rem">
            The WebAssembly build hasn't been deployed yet.<br>
            It will be available here after the first tagged release.<br><br>
            <a href=".." style="color:#ff8c00;text-decoration:none;font-weight:600">← Download the native app</a>
          </div>`;
      };
      script.onload = () => {
        QtLoader({
          canvasElements: [document.getElementById('qt-canvas')],
          showLoader: (status) => {
            loadingStatus.textContent = status;
          },
          showProgress: (fraction) => {
            loadingProgress.style.width = (fraction * 100) + '%';
          },
          showError: (msg) => {
            loadingStatus.textContent = 'Error: ' + msg;
          },
          showExit: () => {
            loadingStatus.textContent = 'Application exited.';
          },
          showCanvas: () => {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('qt-canvas-wrapper').style.visibility = 'visible';
          },
        }).then(instance => {
          window._qtInstance = instance;
        });
      };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
